<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 600" role="img" aria-label="Q400 architecture overview — side profile with key components labelled">
  <title>Q400 — Aeroplane General Architecture</title>
  <desc>Side profile cutaway of the Bombardier Dash 8-Q400 showing forward, center, and aft fuselage sections, high-mounted wing with engine nacelle, fore and trailing rudders on the empennage, and key cockpit-equipment locations.</desc>

  <defs>
    <linearGradient id="skyGradient" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#0e1b2c"/>
      <stop offset="1" stop-color="#0a1322"/>
    </linearGradient>
    <linearGradient id="hullGradient" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#dde6f1"/>
      <stop offset="1" stop-color="#a3b3c6"/>
    </linearGradient>
    <linearGradient id="wingGradient" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#cfd9e6"/>
      <stop offset="1" stop-color="#8fa1b8"/>
    </linearGradient>
    <linearGradient id="propGradient" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#1a2538"/>
      <stop offset="1" stop-color="#3b4d6a"/>
    </linearGradient>
    <pattern id="aftHatch" patternUnits="userSpaceOnUse" width="6" height="6" patternTransform="rotate(45)">
      <line x1="0" y1="0" x2="0" y2="6" stroke="#2a3550" stroke-width="1.2"/>
    </pattern>
    <filter id="softGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="600" fill="url(#skyGradient)"/>

  <!-- Reference grid (subtle) -->
  <g stroke="#1c2a40" stroke-width="0.5" opacity="0.4">
    <line x1="0"   y1="100" x2="1200" y2="100"/>
    <line x1="0"   y1="200" x2="1200" y2="200"/>
    <line x1="0"   y1="300" x2="1200" y2="300"/>
    <line x1="0"   y1="400" x2="1200" y2="400"/>
    <line x1="0"   y1="500" x2="1200" y2="500"/>
    <line x1="200" y1="0"   x2="200"  y2="600"/>
    <line x1="400" y1="0"   x2="400"  y2="600"/>
    <line x1="600" y1="0"   x2="600"  y2="600"/>
    <line x1="800" y1="0"   x2="800"  y2="600"/>
    <line x1="1000" y1="0"  x2="1000" y2="600"/>
  </g>

  <!-- Centered ground reference line -->
  <line x1="40" y1="455" x2="1160" y2="455" stroke="#3a4a66" stroke-width="1.5" stroke-dasharray="8 6"/>
  <text x="60" y="450" fill="#7a8aa6" font-family="Inter, system-ui, sans-serif" font-size="11">GROUND REFERENCE LINE</text>

  <!-- ========================================================================
       FUSELAGE (three sections)
       ====================================================================== -->

  <!-- Forward section (nose + flight deck + fwd baggage) — green tint -->
  <g id="forward-section">
    <path d="M 130,355
             C 110,348 95,338 92,322
             C 90,310 110,300 145,295
             L 240,288
             L 240,360
             L 145,360
             Z"
          fill="url(#hullGradient)" stroke="#3a4a66" stroke-width="1.5"/>
    <!-- forward bulkhead line -->
    <line x1="240" y1="290" x2="240" y2="362" stroke="#0e1b2c" stroke-width="1.5" stroke-dasharray="4 3"/>
    <text x="247" y="285" fill="#a3b3c6" font-family="Inter, system-ui, sans-serif" font-size="10">FWD PRESS BHD</text>
  </g>

  <!-- Center section (cabin) -->
  <g id="center-section">
    <rect x="240" y="288" width="500" height="74" fill="url(#hullGradient)" stroke="#3a4a66" stroke-width="1.5"/>
    <!-- cabin windows row -->
    <g fill="#0e1b2c" opacity="0.85">
      <circle cx="280" cy="313" r="3.5"/>
      <circle cx="300" cy="313" r="3.5"/>
      <circle cx="320" cy="313" r="3.5"/>
      <circle cx="340" cy="313" r="3.5"/>
      <circle cx="360" cy="313" r="3.5"/>
      <circle cx="380" cy="313" r="3.5"/>
      <circle cx="400" cy="313" r="3.5"/>
      <circle cx="420" cy="313" r="3.5"/>
      <circle cx="440" cy="313" r="3.5"/>
      <circle cx="460" cy="313" r="3.5"/>
      <circle cx="480" cy="313" r="3.5"/>
      <circle cx="500" cy="313" r="3.5"/>
      <circle cx="520" cy="313" r="3.5"/>
      <circle cx="540" cy="313" r="3.5"/>
      <circle cx="560" cy="313" r="3.5"/>
      <circle cx="580" cy="313" r="3.5"/>
      <circle cx="600" cy="313" r="3.5"/>
      <circle cx="620" cy="313" r="3.5"/>
      <circle cx="640" cy="313" r="3.5"/>
      <circle cx="660" cy="313" r="3.5"/>
      <circle cx="680" cy="313" r="3.5"/>
      <circle cx="700" cy="313" r="3.5"/>
      <circle cx="720" cy="313" r="3.5"/>
    </g>
    <!-- aft bulkhead line -->
    <line x1="740" y1="288" x2="740" y2="362" stroke="#0e1b2c" stroke-width="1.5" stroke-dasharray="4 3"/>
    <text x="745" y="285" fill="#a3b3c6" font-family="Inter, system-ui, sans-serif" font-size="10">AFT PRESS BHD</text>
  </g>

  <!-- Aft section (unpressurised) — hatched fill -->
  <g id="aft-section">
    <path d="M 740,288
             L 740,362
             L 980,362
             C 1015,360 1040,340 1050,310
             C 1054,295 1040,288 1010,287
             Z"
          fill="url(#aftHatch)" stroke="#3a4a66" stroke-width="1.5"/>
    <!-- APU silhouette -->
    <g transform="translate(910,322)">
      <rect x="-22" y="-12" width="44" height="24" rx="3" fill="#5a6a86" stroke="#1c2a40" stroke-width="1"/>
      <text x="0" y="3" fill="#dde6f1" font-family="Inter, system-ui, sans-serif" font-size="9" text-anchor="middle">APU</text>
    </g>
    <!-- A/C pack silhouette -->
    <g transform="translate(820,322)">
      <rect x="-24" y="-12" width="48" height="24" rx="3" fill="#5a6a86" stroke="#1c2a40" stroke-width="1"/>
      <text x="0" y="3" fill="#dde6f1" font-family="Inter, system-ui, sans-serif" font-size="9" text-anchor="middle">PACKS</text>
    </g>
  </g>

  <!-- ========================================================================
       NOSE — radome
       ====================================================================== -->
  <g id="nose">
    <path d="M 92,322
             C 88,310 92,302 110,295
             C 95,310 95,318 92,322 Z"
          fill="#5a6a86" stroke="#1c2a40" stroke-width="1.2"/>
    <!-- radar lines -->
    <line x1="100" y1="310" x2="115" y2="310" stroke="#dde6f1" stroke-width="0.8" opacity="0.6"/>
    <line x1="98" y1="318" x2="115" y2="318" stroke="#dde6f1" stroke-width="0.8" opacity="0.6"/>
  </g>

  <!-- Flight deck windows -->
  <g id="flight-deck-windows" transform="translate(170,310)">
    <polygon points="0,0 30,0 35,-12 8,-15" fill="#1c2a40" stroke="#0e1b2c" stroke-width="1"/>
    <polygon points="38,-12 60,-12 60,0 36,0" fill="#1c2a40" stroke="#0e1b2c" stroke-width="1"/>
  </g>

  <!-- Forward baggage door indicator -->
  <g id="fwd-baggage">
    <rect x="200" y="335" width="30" height="22" fill="none" stroke="#fbbf24" stroke-width="1.5" stroke-dasharray="3 2"/>
    <text x="215" y="376" fill="#fbbf24" font-family="Inter, system-ui, sans-serif" font-size="9" text-anchor="middle">FWD BAG</text>
  </g>

  <!-- Pax door -->
  <g id="pax-door">
    <rect x="262" y="298" width="14" height="58" fill="#3a4a66" stroke="#dde6f1" stroke-width="1"/>
    <text x="269" y="380" fill="#dde6f1" font-family="Inter, system-ui, sans-serif" font-size="9" text-anchor="middle">PAX</text>
  </g>

  <!-- Type II/III emergency exit -->
  <g id="type23-exit">
    <rect x="500" y="298" width="14" height="58" fill="#3a4a66" stroke="#22c55e" stroke-width="1"/>
    <text x="507" y="380" fill="#22c55e" font-family="Inter, system-ui, sans-serif" font-size="9" text-anchor="middle">II/III</text>
  </g>

  <!-- ========================================================================
       WING (high-mounted), nacelle + propeller
       ====================================================================== -->
  <g id="wing">
    <path d="M 380,290
             L 700,290
             L 720,300
             L 360,300
             Z"
          fill="url(#wingGradient)" stroke="#3a4a66" stroke-width="1.5"/>
    <text x="540" y="310" fill="#0e1b2c" font-family="Inter, system-ui, sans-serif" font-size="11" text-anchor="middle" font-weight="600">HIGH WING (2.5° DIHEDRAL OUTBOARD)</text>
    <!-- aileron line -->
    <line x1="640" y1="296" x2="700" y2="296" stroke="#dc2626" stroke-width="2"/>
    <text x="670" y="284" fill="#fca5a5" font-family="Inter, system-ui, sans-serif" font-size="9" text-anchor="middle">AILERON + SPOILER</text>
    <!-- flap line -->
    <line x1="430" y1="296" x2="630" y2="296" stroke="#22c55e" stroke-width="2" opacity="0.6"/>
  </g>

  <!-- Engine nacelle + propeller -->
  <g id="engine-nacelle" transform="translate(420,260)">
    <ellipse cx="0" cy="20" rx="55" ry="20" fill="#5a6a86" stroke="#1c2a40" stroke-width="1.5"/>
    <!-- spinner -->
    <ellipse cx="-58" cy="20" rx="8" ry="14" fill="url(#propGradient)" stroke="#1c2a40" stroke-width="1"/>
    <!-- propeller blades (six) -->
    <g stroke="#1c2a40" stroke-width="1" fill="url(#propGradient)" opacity="0.85">
      <ellipse cx="-58" cy="20" rx="3" ry="40" transform="rotate(0 -58 20)"/>
      <ellipse cx="-58" cy="20" rx="3" ry="40" transform="rotate(60 -58 20)"/>
      <ellipse cx="-58" cy="20" rx="3" ry="40" transform="rotate(120 -58 20)"/>
    </g>
    <text x="0" y="22" fill="#dde6f1" font-family="Inter, system-ui, sans-serif" font-size="10" text-anchor="middle">PW150A</text>
    <text x="0" y="34" fill="#a3b3c6" font-family="Inter, system-ui, sans-serif" font-size="8" text-anchor="middle">5071 SHP</text>
  </g>

  <!-- Main landing gear (stowed under nacelle) -->
  <g id="mlg">
    <rect x="404" y="295" width="32" height="14" fill="#3a4a66" stroke="#1c2a40" stroke-width="1"/>
  </g>
  <!-- Nose gear -->
  <g id="nlg">
    <rect x="160" y="358" width="22" height="10" fill="#3a4a66" stroke="#1c2a40" stroke-width="1"/>
  </g>

  <!-- ========================================================================
       EMPENNAGE — fore + trailing rudder, horizontal stabilizer, bullet fairing
       ====================================================================== -->
  <g id="empennage">
    <!-- Vertical stabilizer -->
    <path d="M 950,290
             L 1015,180
             L 1075,178
             L 1080,290 Z"
          fill="url(#wingGradient)" stroke="#3a4a66" stroke-width="1.5"/>
    <!-- Fore rudder -->
    <line x1="1058" y1="200" x2="1078" y2="290" stroke="#0e1b2c" stroke-width="1.5" stroke-dasharray="3 2"/>
    <text x="1020" y="220" fill="#0e1b2c" font-family="Inter, system-ui, sans-serif" font-size="9" font-weight="600">FORE</text>
    <!-- Trailing rudder -->
    <path d="M 1078,290
             L 1075,178
             L 1095,180
             L 1110,290 Z"
          fill="#7a8aa6" stroke="#0e1b2c" stroke-width="1.2"/>
    <text x="1093" y="225" fill="#0e1b2c" font-family="Inter, system-ui, sans-serif" font-size="9" font-weight="600">TRAIL</text>
    <text x="1085" y="245" fill="#0e1b2c" font-family="Inter, system-ui, sans-serif" font-size="8" text-anchor="middle">2x</text>

    <!-- Bullet fairing -->
    <ellipse cx="1045" cy="178" rx="32" ry="6" fill="#5a6a86" stroke="#1c2a40" stroke-width="1"/>

    <!-- Horizontal stabilizer (on top of bullet fairing) -->
    <path d="M 985,178
             L 1105,178
             L 1135,170
             L 985,170 Z"
          fill="url(#wingGradient)" stroke="#3a4a66" stroke-width="1.5"/>
    <!-- Elevator break -->
    <line x1="1045" y1="174" x2="1045" y2="178" stroke="#dc2626" stroke-width="2"/>
    <text x="1010" y="165" fill="#fca5a5" font-family="Inter, system-ui, sans-serif" font-size="9" text-anchor="middle">L ELEV</text>
    <text x="1085" y="165" fill="#fca5a5" font-family="Inter, system-ui, sans-serif" font-size="9" text-anchor="middle">R ELEV</text>
  </g>

  <!-- ========================================================================
       SECTION LABELS (top)
       ====================================================================== -->
  <g font-family="Inter, system-ui, sans-serif" font-weight="600">
    <text x="170" y="65" fill="#22c55e" font-size="13" text-anchor="middle">FORWARD</text>
    <text x="170" y="80" fill="#86efac" font-size="10" text-anchor="middle">flight deck • fwd baggage • nose</text>
    <text x="170" y="93" fill="#86efac" font-size="9" text-anchor="middle">PRESSURISED</text>

    <text x="490" y="65" fill="#38bdf8" font-size="13" text-anchor="middle">CENTER</text>
    <text x="490" y="80" fill="#7dd3fc" font-size="10" text-anchor="middle">passenger cabin (58 – 72 pax)</text>
    <text x="490" y="93" fill="#7dd3fc" font-size="9" text-anchor="middle">PRESSURISED</text>

    <text x="900" y="65" fill="#fbbf24" font-size="13" text-anchor="middle">AFT</text>
    <text x="900" y="80" fill="#fcd34d" font-size="10" text-anchor="middle">A/C packs • APU • empennage support</text>
    <text x="900" y="93" fill="#f59e0b" font-size="9" text-anchor="middle">UNPRESSURISED</text>
  </g>

  <!-- ========================================================================
       DIMENSION CALLOUTS (bottom)
       ====================================================================== -->
  <g font-family="Inter, system-ui, sans-serif">
    <line x1="92" y1="510" x2="1110" y2="510" stroke="#7a8aa6" stroke-width="1"/>
    <line x1="92" y1="505" x2="92" y2="515" stroke="#7a8aa6" stroke-width="1.5"/>
    <line x1="1110" y1="505" x2="1110" y2="515" stroke="#7a8aa6" stroke-width="1.5"/>
    <text x="601" y="505" fill="#dde6f1" font-size="11" text-anchor="middle" font-weight="600">LENGTH 32.83 m (107 ft 9 in)</text>

    <text x="601" y="540" fill="#a3b3c6" font-size="11" text-anchor="middle">WING SPAN 28.42 m (93 ft 3 in) • MTOW up to 29 257 kg • CEILING FL250</text>
    <text x="601" y="558" fill="#7a8aa6" font-size="10" text-anchor="middle">2 × Pratt &amp; Whitney PW150A • 5071 SHP each • 6-blade propellers</text>
    <text x="601" y="582" fill="#7a8aa6" font-size="9" text-anchor="middle" font-style="italic">Side profile — schematic, not to scale</text>
  </g>

  <!-- ========================================================================
       HOTSPOT MARKERS (rendered as numbered circles)
       The DiagramEngine on the live site overrides these positions using
       the diagram_hotspots table; here they are shown as visual references.
       ====================================================================== -->
  <g id="hotspots" font-family="Inter, system-ui, sans-serif" font-weight="700">
    <g class="hotspot" data-id="h1">
      <circle cx="100" cy="312" r="11" fill="#22d3ee" stroke="#0e1b2c" stroke-width="1.5"/>
      <text x="100" y="316" font-size="11" fill="#0e1b2c" text-anchor="middle">1</text>
    </g>
    <g class="hotspot" data-id="h2">
      <circle cx="240" cy="380" r="11" fill="#22d3ee" stroke="#0e1b2c" stroke-width="1.5"/>
      <text x="240" y="384" font-size="11" fill="#0e1b2c" text-anchor="middle">2</text>
    </g>
    <g class="hotspot" data-id="h3">
      <circle cx="180" cy="304" r="11" fill="#22d3ee" stroke="#0e1b2c" stroke-width="1.5"/>
      <text x="180" y="308" font-size="11" fill="#0e1b2c" text-anchor="middle">3</text>
    </g>
    <g class="hotspot" data-id="h4">
      <circle cx="215" cy="346" r="11" fill="#fbbf24" stroke="#0e1b2c" stroke-width="1.5"/>
      <text x="215" y="350" font-size="11" fill="#0e1b2c" text-anchor="middle">4</text>
    </g>
    <g class="hotspot" data-id="h5">
      <circle cx="269" cy="328" r="11" fill="#22c55e" stroke="#0e1b2c" stroke-width="1.5"/>
      <text x="269" y="332" font-size="11" fill="#0e1b2c" text-anchor="middle">5</text>
    </g>
    <g class="hotspot" data-id="h6">
      <circle cx="420" cy="280" r="11" fill="#22d3ee" stroke="#0e1b2c" stroke-width="1.5"/>
      <text x="420" y="284" font-size="11" fill="#0e1b2c" text-anchor="middle">6</text>
    </g>
    <g class="hotspot" data-id="h7">
      <circle cx="540" cy="295" r="11" fill="#22d3ee" stroke="#0e1b2c" stroke-width="1.5"/>
      <text x="540" y="299" font-size="11" fill="#0e1b2c" text-anchor="middle">7</text>
    </g>
    <g class="hotspot" data-id="h8">
      <circle cx="670" cy="296" r="11" fill="#22d3ee" stroke="#0e1b2c" stroke-width="1.5"/>
      <text x="670" y="300" font-size="11" fill="#0e1b2c" text-anchor="middle">8</text>
    </g>
    <g class="hotspot" data-id="h9">
      <circle cx="507" cy="328" r="11" fill="#22c55e" stroke="#0e1b2c" stroke-width="1.5"/>
      <text x="507" y="332" font-size="11" fill="#0e1b2c" text-anchor="middle">9</text>
    </g>
    <g class="hotspot" data-id="h10">
      <circle cx="740" cy="380" r="11" fill="#22d3ee" stroke="#0e1b2c" stroke-width="1.5"/>
      <text x="740" y="384" font-size="11" fill="#0e1b2c" text-anchor="middle">10</text>
    </g>
    <g class="hotspot" data-id="h11">
      <circle cx="820" cy="322" r="11" fill="#fbbf24" stroke="#0e1b2c" stroke-width="1.5"/>
      <text x="820" y="326" font-size="11" fill="#0e1b2c" text-anchor="middle">11</text>
    </g>
    <g class="hotspot" data-id="h12">
      <circle cx="910" cy="322" r="11" fill="#fbbf24" stroke="#0e1b2c" stroke-width="1.5"/>
      <text x="910" y="326" font-size="11" fill="#0e1b2c" text-anchor="middle">12</text>
    </g>
    <g class="hotspot" data-id="h13">
      <circle cx="1090" cy="220" r="11" fill="#22d3ee" stroke="#0e1b2c" stroke-width="1.5"/>
      <text x="1090" y="224" font-size="11" fill="#0e1b2c" text-anchor="middle">13</text>
    </g>
    <g class="hotspot" data-id="h14">
      <circle cx="1045" cy="172" r="11" fill="#22d3ee" stroke="#0e1b2c" stroke-width="1.5"/>
      <text x="1045" y="176" font-size="11" fill="#0e1b2c" text-anchor="middle">14</text>
    </g>
  </g>
</svg>
