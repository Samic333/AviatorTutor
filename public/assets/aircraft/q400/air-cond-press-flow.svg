<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 600" role="img" aria-label="Q400 ECS and Pressurization flow diagram — bleed sources, ACMs, heat exchangers, distribution, outflow and safety valves">
  <title>Q400 — ECS + Pressurization Flow</title>
  <desc>Flow diagram showing engine bleed and APU sources entering two ACMs that share a primary and secondary heat exchanger, conditioned air feeding the recirculation manifold and distribution to flight deck and cabin, and three pressurization valves (aft outflow primary, aft safety, forward safety).</desc>

  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#0e1b2c"/>
      <stop offset="1" stop-color="#0a1322"/>
    </linearGradient>
    <linearGradient id="hotPipe" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#dc2626"/>
      <stop offset="0.7" stop-color="#f59e0b"/>
      <stop offset="1" stop-color="#fcd34d"/>
    </linearGradient>
    <linearGradient id="coolPipe" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#fcd34d"/>
      <stop offset="0.5" stop-color="#22d3ee"/>
      <stop offset="1" stop-color="#38bdf8"/>
    </linearGradient>
    <linearGradient id="boxFill" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#1c2a40"/>
      <stop offset="1" stop-color="#0e1b2c"/>
    </linearGradient>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 Z" fill="#7dd3fc"/>
    </marker>
    <marker id="arrowHot" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 Z" fill="#f59e0b"/>
    </marker>
  </defs>

  <rect width="1200" height="600" fill="url(#bg)"/>

  <!-- Title bar -->
  <text x="600" y="36" text-anchor="middle" fill="#dde6f1" font-family="Inter, system-ui, sans-serif" font-size="20" font-weight="700">Q400 ECS + Pressurization Flow</text>
  <text x="600" y="58" text-anchor="middle" fill="#7a8aa6" font-family="Inter, system-ui, sans-serif" font-size="12">Hot bleed sources (left) → ACMs &amp; shared heat exchangers → distribution → outflow valves (right)</text>

  <!-- ========================================================================
       SOURCES (left column)
       ====================================================================== -->
  <g font-family="Inter, system-ui, sans-serif">
    <!-- No.1 engine bleed -->
    <g>
      <rect x="40" y="100" width="170" height="56" rx="8" fill="url(#boxFill)" stroke="#f59e0b" stroke-width="1.5"/>
      <text x="125" y="123" text-anchor="middle" fill="#fcd34d" font-size="13" font-weight="600">No.1 ENGINE BLEED</text>
      <text x="125" y="142" text-anchor="middle" fill="#fbbf24" font-size="11">PW150A — Nacelle SOV</text>
    </g>
    <!-- No.2 engine bleed -->
    <g>
      <rect x="40" y="180" width="170" height="56" rx="8" fill="url(#boxFill)" stroke="#f59e0b" stroke-width="1.5"/>
      <text x="125" y="203" text-anchor="middle" fill="#fcd34d" font-size="13" font-weight="600">No.2 ENGINE BLEED</text>
      <text x="125" y="222" text-anchor="middle" fill="#fbbf24" font-size="11">PW150A — Nacelle SOV</text>
    </g>
    <!-- APU bleed -->
    <g>
      <rect x="40" y="260" width="170" height="56" rx="8" fill="url(#boxFill)" stroke="#fbbf24" stroke-width="1.5"/>
      <text x="125" y="283" text-anchor="middle" fill="#fcd34d" font-size="13" font-weight="600">APU BLEED</text>
      <text x="125" y="302" text-anchor="middle" fill="#fbbf24" font-size="11">internal ECU schedule</text>
    </g>
    <!-- Ground A/C -->
    <g>
      <rect x="40" y="340" width="170" height="56" rx="8" fill="url(#boxFill)" stroke="#22c55e" stroke-width="1.5"/>
      <text x="125" y="363" text-anchor="middle" fill="#86efac" font-size="13" font-weight="600">GROUND A/C</text>
      <text x="125" y="382" text-anchor="middle" fill="#22c55e" font-size="11">aft fuselage, RH, X 860</text>
    </g>
    <!-- BLEED selector reminder -->
    <g>
      <rect x="40" y="430" width="170" height="40" rx="6" fill="#0a1322" stroke="#7a8aa6" stroke-width="1" stroke-dasharray="3 2"/>
      <text x="125" y="447" text-anchor="middle" fill="#a3b3c6" font-size="10">BLEED selector:</text>
      <text x="125" y="462" text-anchor="middle" fill="#fcd34d" font-size="10">MIN (TO) · NORM · MAX</text>
    </g>
  </g>

  <!-- Pipes from sources to ACMs -->
  <g stroke="url(#hotPipe)" stroke-width="3" fill="none" marker-end="url(#arrowHot)">
    <path d="M 210 128 L 350 128 L 360 230"/>
    <path d="M 210 208 L 360 208 L 365 230"/>
    <path d="M 210 288 L 320 288 L 360 246"/>
    <path d="M 210 368 L 290 368 L 290 270 L 360 235"/>
  </g>

  <!-- ========================================================================
       ACM + Heat exchanger module (center)
       ====================================================================== -->
  <g>
    <rect x="350" y="150" width="280" height="200" rx="10" fill="#142339" stroke="#22d3ee" stroke-width="2"/>
    <text x="490" y="180" text-anchor="middle" fill="#22d3ee" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="700">ECS PACK MODULE</text>
    <text x="490" y="198" text-anchor="middle" fill="#7dd3fc" font-family="Inter, system-ui, sans-serif" font-size="10">aft equipment bay (unpressurised)</text>

    <!-- ACM 1 -->
    <rect x="370" y="215" width="110" height="50" rx="6" fill="#1c2a40" stroke="#22d3ee" stroke-width="1.2"/>
    <text x="425" y="234" text-anchor="middle" fill="#22d3ee" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="600">ACM 1</text>
    <text x="425" y="252" text-anchor="middle" fill="#7dd3fc" font-family="Inter, system-ui, sans-serif" font-size="9">turbine + compressor</text>

    <!-- ACM 2 -->
    <rect x="500" y="215" width="110" height="50" rx="6" fill="#1c2a40" stroke="#22d3ee" stroke-width="1.2"/>
    <text x="555" y="234" text-anchor="middle" fill="#22d3ee" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="600">ACM 2</text>
    <text x="555" y="252" text-anchor="middle" fill="#7dd3fc" font-family="Inter, system-ui, sans-serif" font-size="9">turbine + compressor</text>

    <!-- Shared HX bar -->
    <rect x="370" y="285" width="240" height="50" rx="6" fill="#0e1b2c" stroke="#fbbf24" stroke-width="1.2"/>
    <text x="490" y="305" text-anchor="middle" fill="#fcd34d" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="600">SHARED PRIMARY + SECONDARY HX</text>
    <text x="490" y="322" text-anchor="middle" fill="#fbbf24" font-family="Inter, system-ui, sans-serif" font-size="9">single dual-stage exchanger — both ACMs feed</text>

    <!-- Mini connectors -->
    <line x1="425" y1="265" x2="425" y2="285" stroke="#22d3ee" stroke-width="1.5"/>
    <line x1="555" y1="265" x2="555" y2="285" stroke="#22d3ee" stroke-width="1.5"/>
  </g>

  <!-- FCSOV labels -->
  <g font-family="Inter, system-ui, sans-serif" fill="#a3b3c6" font-size="9">
    <text x="365" y="208" text-anchor="middle">FCSOV</text>
    <text x="370" y="218" text-anchor="middle">↑</text>
  </g>

  <!-- Conditioned air pipe to manifold -->
  <g stroke="url(#coolPipe)" stroke-width="4" fill="none" marker-end="url(#arrow)">
    <path d="M 630 250 L 720 250"/>
  </g>

  <!-- ========================================================================
       Distribution manifold
       ====================================================================== -->
  <g>
    <rect x="720" y="220" width="160" height="80" rx="8" fill="#142339" stroke="#38bdf8" stroke-width="1.5"/>
    <text x="800" y="245" text-anchor="middle" fill="#38bdf8" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="600">DISTRIBUTION</text>
    <text x="800" y="262" text-anchor="middle" fill="#7dd3fc" font-family="Inter, system-ui, sans-serif" font-size="10">manifold + recirc mix</text>
    <text x="800" y="282" text-anchor="middle" fill="#7dd3fc" font-family="Inter, system-ui, sans-serif" font-size="9">~25% flight deck · ~75% cabin</text>
  </g>

  <!-- Recirc fan + filter -->
  <g>
    <rect x="720" y="320" width="160" height="40" rx="6" fill="#0a1322" stroke="#7dd3fc" stroke-width="1.2" stroke-dasharray="3 2"/>
    <text x="800" y="337" text-anchor="middle" fill="#7dd3fc" font-family="Inter, system-ui, sans-serif" font-size="11">RECIRC FAN</text>
    <text x="800" y="352" text-anchor="middle" fill="#a3b3c6" font-family="Inter, system-ui, sans-serif" font-size="9">filter behind aft class-C bag</text>
  </g>

  <!-- Recirc loop -->
  <g stroke="#7dd3fc" stroke-width="1.5" fill="none" stroke-dasharray="4 3" marker-end="url(#arrow)">
    <path d="M 880 340 C 940 340 940 250 880 250"/>
  </g>

  <!-- ========================================================================
       Cabin + cockpit + outflow + safeties
       ====================================================================== -->
  <g>
    <!-- Flight deck -->
    <rect x="900" y="100" width="120" height="60" rx="8" fill="#142339" stroke="#22c55e" stroke-width="1.5"/>
    <text x="960" y="125" text-anchor="middle" fill="#86efac" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="600">FLT DECK</text>
    <text x="960" y="142" text-anchor="middle" fill="#22c55e" font-family="Inter, system-ui, sans-serif" font-size="10">~25% flow</text>

    <!-- Cabin -->
    <rect x="900" y="180" width="240" height="60" rx="8" fill="#142339" stroke="#22c55e" stroke-width="1.5"/>
    <text x="1020" y="205" text-anchor="middle" fill="#86efac" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="600">CABIN  (58–72 PAX)</text>
    <text x="1020" y="222" text-anchor="middle" fill="#22c55e" font-family="Inter, system-ui, sans-serif" font-size="10">~75% flow · MAX 5.5 PSI · WARN > 9 800 ft</text>

    <!-- Forward safety valve -->
    <g>
      <circle cx="900" cy="155" r="14" fill="#0a1322" stroke="#dc2626" stroke-width="1.5"/>
      <text x="900" y="159" text-anchor="middle" fill="#fca5a5" font-family="Inter, system-ui, sans-serif" font-size="9" font-weight="700">FSV</text>
    </g>

    <!-- Aft outflow valve -->
    <g>
      <circle cx="1140" cy="210" r="20" fill="#0a1322" stroke="#22d3ee" stroke-width="2"/>
      <text x="1140" y="207" text-anchor="middle" fill="#22d3ee" font-family="Inter, system-ui, sans-serif" font-size="9" font-weight="700">AFT</text>
      <text x="1140" y="220" text-anchor="middle" fill="#22d3ee" font-family="Inter, system-ui, sans-serif" font-size="9" font-weight="700">OUTFLOW</text>
    </g>

    <!-- Aft safety valve -->
    <g>
      <circle cx="1140" cy="270" r="14" fill="#0a1322" stroke="#fbbf24" stroke-width="1.5"/>
      <text x="1140" y="274" text-anchor="middle" fill="#fcd34d" font-family="Inter, system-ui, sans-serif" font-size="9" font-weight="700">ASV</text>
    </g>
  </g>

  <!-- Distribution pipes to flight deck and cabin -->
  <g stroke="url(#coolPipe)" stroke-width="3" fill="none" marker-end="url(#arrow)">
    <path d="M 800 220 L 800 130 L 900 130"/>
    <path d="M 880 250 L 900 210"/>
  </g>

  <!-- Outflow exits -->
  <g stroke="#22d3ee" stroke-width="2" fill="none" marker-end="url(#arrow)" opacity="0.7">
    <path d="M 1140 240 L 1140 290"/>
    <path d="M 1160 210 L 1190 210"/>
    <path d="M 1160 270 L 1190 270"/>
  </g>
  <text x="1180" y="240" fill="#7a8aa6" font-family="Inter, system-ui, sans-serif" font-size="9" text-anchor="end" transform="translate(20,0)">overboard</text>

  <!-- Cabin → outflow link -->
  <g stroke="#22d3ee" stroke-width="2" fill="none" marker-end="url(#arrow)" opacity="0.7">
    <path d="M 1140 180 L 1140 195"/>
  </g>

  <!-- ========================================================================
       Cockpit panel callouts (bottom)
       ====================================================================== -->
  <g font-family="Inter, system-ui, sans-serif">
    <!-- AIR CONDITIONING panel -->
    <rect x="40" y="495" width="280" height="80" rx="8" fill="#0a1322" stroke="#3a4a66" stroke-width="1"/>
    <text x="180" y="514" text-anchor="middle" fill="#dde6f1" font-size="12" font-weight="600">AIR CONDITIONING PANEL</text>
    <text x="180" y="532" text-anchor="middle" fill="#a3b3c6" font-size="10">BLEED 1 / 2 · MIN/NORM/MAX · PACK OFF/MAN/AUTO</text>
    <text x="180" y="548" text-anchor="middle" fill="#a3b3c6" font-size="10">RECIRC · CABIN/FLT-COMP TEMP · F/A xfer</text>

    <!-- CPC panel -->
    <rect x="340" y="495" width="280" height="80" rx="8" fill="#0a1322" stroke="#3a4a66" stroke-width="1"/>
    <text x="480" y="514" text-anchor="middle" fill="#dde6f1" font-size="12" font-weight="600">CABIN PRESSURE CONTROL (CPC)</text>
    <text x="480" y="532" text-anchor="middle" fill="#a3b3c6" font-size="10">AUTO–MAN–DUMP · LDG ALT · MAN DIFF</text>
    <text x="480" y="548" text-anchor="middle" fill="#a3b3c6" font-size="10">FWD OUTFLOW knob · FAULT light</text>

    <!-- Indicator panel -->
    <rect x="640" y="495" width="280" height="80" rx="8" fill="#0a1322" stroke="#3a4a66" stroke-width="1"/>
    <text x="780" y="514" text-anchor="middle" fill="#dde6f1" font-size="12" font-weight="600">PRESSURIZATION INDICATOR PANEL</text>
    <text x="780" y="532" text-anchor="middle" fill="#a3b3c6" font-size="10">CABIN ALT · DIFF PSI (max 5.5) · RATE fpm × 1000</text>
    <text x="780" y="548" text-anchor="middle" fill="#a3b3c6" font-size="10">CABIN PRESS warn @ 9 800 ft</text>

    <!-- FSV selector -->
    <rect x="940" y="495" width="220" height="80" rx="8" fill="#0a1322" stroke="#dc2626" stroke-width="1"/>
    <text x="1050" y="514" text-anchor="middle" fill="#fca5a5" font-size="12" font-weight="600">FSV SELECTOR</text>
    <text x="1050" y="532" text-anchor="middle" fill="#fbbf24" font-size="10">copilot side console</text>
    <text x="1050" y="548" text-anchor="middle" fill="#fbbf24" font-size="10">NORMAL · OPEN  (NO MODULATE)</text>
  </g>

  <!-- ========================================================================
       HOTSPOT MARKERS (overlay points; DiagramEngine uses x_pct/y_pct)
       ====================================================================== -->
  <g font-family="Inter, system-ui, sans-serif" font-weight="700">
    <g class="hotspot" data-id="h1"><circle cx="125" cy="128" r="11" fill="#22d3ee" stroke="#0e1b2c" stroke-width="1.5"/><text x="125" y="132" font-size="11" fill="#0e1b2c" text-anchor="middle">1</text></g>
    <g class="hotspot" data-id="h2"><circle cx="125" cy="208" r="11" fill="#22d3ee" stroke="#0e1b2c" stroke-width="1.5"/><text x="125" y="212" font-size="11" fill="#0e1b2c" text-anchor="middle">2</text></g>
    <g class="hotspot" data-id="h3"><circle cx="125" cy="288" r="11" fill="#22d3ee" stroke="#0e1b2c" stroke-width="1.5"/><text x="125" y="292" font-size="11" fill="#0e1b2c" text-anchor="middle">3</text></g>
    <g class="hotspot" data-id="h4"><circle cx="125" cy="368" r="11" fill="#22c55e" stroke="#0e1b2c" stroke-width="1.5"/><text x="125" y="372" font-size="11" fill="#0e1b2c" text-anchor="middle">4</text></g>
    <g class="hotspot" data-id="h5"><circle cx="425" cy="240" r="11" fill="#22d3ee" stroke="#0e1b2c" stroke-width="1.5"/><text x="425" y="244" font-size="11" fill="#0e1b2c" text-anchor="middle">5</text></g>
    <g class="hotspot" data-id="h6"><circle cx="555" cy="240" r="11" fill="#22d3ee" stroke="#0e1b2c" stroke-width="1.5"/><text x="555" y="244" font-size="11" fill="#0e1b2c" text-anchor="middle">6</text></g>
    <g class="hotspot" data-id="h7"><circle cx="490" cy="310" r="11" fill="#fbbf24" stroke="#0e1b2c" stroke-width="1.5"/><text x="490" y="314" font-size="11" fill="#0e1b2c" text-anchor="middle">7</text></g>
    <g class="hotspot" data-id="h8"><circle cx="800" cy="260" r="11" fill="#7dd3fc" stroke="#0e1b2c" stroke-width="1.5"/><text x="800" y="264" font-size="11" fill="#0e1b2c" text-anchor="middle">8</text></g>
    <g class="hotspot" data-id="h9"><circle cx="800" cy="340" r="11" fill="#7dd3fc" stroke="#0e1b2c" stroke-width="1.5"/><text x="800" y="344" font-size="11" fill="#0e1b2c" text-anchor="middle">9</text></g>
    <g class="hotspot" data-id="h10"><circle cx="960" cy="130" r="11" fill="#22c55e" stroke="#0e1b2c" stroke-width="1.5"/><text x="960" y="134" font-size="11" fill="#0e1b2c" text-anchor="middle">10</text></g>
    <g class="hotspot" data-id="h11"><circle cx="1020" cy="210" r="11" fill="#22c55e" stroke="#0e1b2c" stroke-width="1.5"/><text x="1020" y="214" font-size="11" fill="#0e1b2c" text-anchor="middle">11</text></g>
    <g class="hotspot" data-id="h12"><circle cx="900" cy="155" r="11" fill="#dc2626" stroke="#0e1b2c" stroke-width="1.5"/><text x="900" y="159" font-size="11" fill="#fff" text-anchor="middle">12</text></g>
    <g class="hotspot" data-id="h13"><circle cx="1140" cy="210" r="11" fill="#22d3ee" stroke="#0e1b2c" stroke-width="1.5"/><text x="1140" y="214" font-size="11" fill="#0e1b2c" text-anchor="middle">13</text></g>
    <g class="hotspot" data-id="h14"><circle cx="1140" cy="270" r="11" fill="#fbbf24" stroke="#0e1b2c" stroke-width="1.5"/><text x="1140" y="274" font-size="11" fill="#0e1b2c" text-anchor="middle">14</text></g>
  </g>
</svg>
