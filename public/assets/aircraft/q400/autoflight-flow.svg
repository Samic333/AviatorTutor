<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 600" role="img" aria-label="Q400 AFCS architecture: two Flight Guidance Modules driving two Autopilot Actuator Units, FGCP interface, glareshield AP disengage warning lights, PFD Flight Mode Annunciator">
  <title>Q400 AFCS Architecture and Disengage Logic</title>
  <desc>Block diagram of the Q400 Automatic Flight Control System. FGM1 commands the AP/YD actuators while FGM2 monitors. The Flight Guidance Control Panel is the cockpit interface. The Flight Mode Annunciator at the top of the PFD shows mode state with WHITE for armed and GREEN for active. Two AP DISENG warning lights on the glareshield flash for automatic disengagements; AP DIS pushbuttons on the control wheels acknowledge.</desc>

  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#0e1b2c"/><stop offset="1" stop-color="#0a1322"/></linearGradient>
    <linearGradient id="boxFill" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#1c2a40"/><stop offset="1" stop-color="#0e1b2c"/></linearGradient>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M 0 0 L 10 5 L 0 10 Z" fill="#7dd3fc"/></marker>
    <marker id="arrowMon" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M 0 0 L 10 5 L 0 10 Z" fill="#a78bfa"/></marker>
    <marker id="arrowSensor" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M 0 0 L 10 5 L 0 10 Z" fill="#fbbf24"/></marker>
  </defs>

  <rect width="1200" height="600" fill="url(#bg)"/>

  <text x="600" y="36" text-anchor="middle" fill="#dde6f1" font-family="Inter, system-ui, sans-serif" font-size="20" font-weight="700">Q400 AFCS Architecture</text>
  <text x="600" y="58" text-anchor="middle" fill="#7a8aa6" font-family="Inter, system-ui, sans-serif" font-size="12">FGM1 commands · FGM2 monitors · 2 APAUs · FGCP interface · FMA white-armed / green-active</text>

  <!-- ==================== SENSORS column (left) ==================== -->
  <g font-family="Inter, system-ui, sans-serif">
    <rect x="40" y="100" width="150" height="40" rx="6" fill="url(#boxFill)" stroke="#fbbf24" stroke-width="1.5"/>
    <text x="115" y="124" text-anchor="middle" fill="#fcd34d" font-size="13" font-weight="600">AHRS 1</text>
    <rect x="40" y="160" width="150" height="40" rx="6" fill="url(#boxFill)" stroke="#fbbf24" stroke-width="1.5"/>
    <text x="115" y="184" text-anchor="middle" fill="#fcd34d" font-size="13" font-weight="600">AHRS 2</text>
    <rect x="40" y="220" width="150" height="40" rx="6" fill="url(#boxFill)" stroke="#fbbf24" stroke-width="1.5"/>
    <text x="115" y="244" text-anchor="middle" fill="#fcd34d" font-size="13" font-weight="600">ADC 1</text>
    <rect x="40" y="280" width="150" height="40" rx="6" fill="url(#boxFill)" stroke="#fbbf24" stroke-width="1.5"/>
    <text x="115" y="304" text-anchor="middle" fill="#fcd34d" font-size="13" font-weight="600">ADC 2</text>

    <text x="115" y="345" text-anchor="middle" fill="#a3b3c6" font-size="10" font-style="italic">all four valid</text>
    <text x="115" y="358" text-anchor="middle" fill="#a3b3c6" font-size="10" font-style="italic">+ no disagree</text>
    <text x="115" y="372" text-anchor="middle" fill="#a3b3c6" font-size="10" font-style="italic">→ AP can engage</text>
  </g>

  <!-- Sensor lines to FGMs -->
  <g stroke="#fbbf24" stroke-width="1.5" fill="none" marker-end="url(#arrowSensor)" opacity="0.7">
    <path d="M 190 120 L 280 180"/>
    <path d="M 190 180 L 280 200"/>
    <path d="M 190 240 L 280 220"/>
    <path d="M 190 300 L 280 240"/>
  </g>

  <!-- ==================== FGM column (center-left) ==================== -->
  <g>
    <rect x="280" y="155" width="170" height="100" rx="10" fill="#142339" stroke="#22d3ee" stroke-width="2.2"/>
    <text x="365" y="180" text-anchor="middle" fill="#22d3ee" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="700">FGM 1</text>
    <text x="365" y="200" text-anchor="middle" fill="#7dd3fc" font-family="Inter, system-ui, sans-serif" font-size="10">Flight Guidance Module 1</text>
    <text x="365" y="220" text-anchor="middle" fill="#fcd34d" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="600">COMMANDS</text>
    <text x="365" y="240" text-anchor="middle" fill="#a3b3c6" font-family="Inter, system-ui, sans-serif" font-size="9">drives AP/YD actuators</text>

    <rect x="280" y="285" width="170" height="100" rx="10" fill="#142339" stroke="#a78bfa" stroke-width="2.2"/>
    <text x="365" y="310" text-anchor="middle" fill="#a78bfa" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="700">FGM 2</text>
    <text x="365" y="330" text-anchor="middle" fill="#c4b5fd" font-family="Inter, system-ui, sans-serif" font-size="10">Flight Guidance Module 2</text>
    <text x="365" y="350" text-anchor="middle" fill="#fcd34d" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="600">MONITORS</text>
    <text x="365" y="370" text-anchor="middle" fill="#a3b3c6" font-family="Inter, system-ui, sans-serif" font-size="9">watches FGM 1 + actuators</text>
  </g>

  <!-- FGM cross-monitor lines -->
  <g stroke="#a78bfa" stroke-width="1.5" stroke-dasharray="3 2" fill="none" marker-end="url(#arrowMon)">
    <path d="M 365 255 L 365 285"/>
  </g>

  <!-- ==================== APAU column (center) ==================== -->
  <g>
    <rect x="510" y="180" width="160" height="80" rx="10" fill="#142339" stroke="#22d3ee" stroke-width="1.5"/>
    <text x="590" y="205" text-anchor="middle" fill="#22d3ee" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="700">APAU 1</text>
    <text x="590" y="225" text-anchor="middle" fill="#7dd3fc" font-family="Inter, system-ui, sans-serif" font-size="10">Pitch + Roll servos</text>
    <text x="590" y="245" text-anchor="middle" fill="#a3b3c6" font-family="Inter, system-ui, sans-serif" font-size="9">controls + trim</text>

    <rect x="510" y="290" width="160" height="80" rx="10" fill="#142339" stroke="#22d3ee" stroke-width="1.5"/>
    <text x="590" y="315" text-anchor="middle" fill="#22d3ee" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="700">APAU 2</text>
    <text x="590" y="335" text-anchor="middle" fill="#7dd3fc" font-family="Inter, system-ui, sans-serif" font-size="10">Yaw Damper actuator</text>
    <text x="590" y="355" text-anchor="middle" fill="#a3b3c6" font-family="Inter, system-ui, sans-serif" font-size="9">rudder authority</text>
  </g>

  <!-- FGM1 → APAU command lines -->
  <g stroke="#22d3ee" stroke-width="2" fill="none" marker-end="url(#arrow)">
    <path d="M 450 200 L 510 215"/>
    <path d="M 450 235 L 510 320"/>
  </g>

  <!-- ==================== Flight Controls column (right) ==================== -->
  <g>
    <rect x="740" y="180" width="150" height="80" rx="10" fill="#142339" stroke="#22c55e" stroke-width="1.5"/>
    <text x="815" y="205" text-anchor="middle" fill="#86efac" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="700">FCECU</text>
    <text x="815" y="222" text-anchor="middle" fill="#22c55e" font-family="Inter, system-ui, sans-serif" font-size="10">Flight Control ECU</text>
    <text x="815" y="241" text-anchor="middle" fill="#a3b3c6" font-family="Inter, system-ui, sans-serif" font-size="9">priorities: manual &gt; AFCS</text>

    <rect x="740" y="290" width="150" height="80" rx="10" fill="#142339" stroke="#22c55e" stroke-width="1.5"/>
    <text x="815" y="315" text-anchor="middle" fill="#86efac" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="700">CONTROL SURF.</text>
    <text x="815" y="332" text-anchor="middle" fill="#22c55e" font-family="Inter, system-ui, sans-serif" font-size="10">elevator · aileron</text>
    <text x="815" y="349" text-anchor="middle" fill="#22c55e" font-family="Inter, system-ui, sans-serif" font-size="10">spoiler · rudder</text>
  </g>

  <g stroke="#22d3ee" stroke-width="2" fill="none" marker-end="url(#arrow)">
    <path d="M 670 220 L 740 220"/>
    <path d="M 670 330 L 740 330"/>
    <path d="M 815 260 L 815 290"/>
  </g>

  <!-- ==================== Cockpit interface ==================== -->
  <g>
    <!-- FGCP -->
    <rect x="940" y="100" width="220" height="90" rx="10" fill="#0a1322" stroke="#7dd3fc" stroke-width="1.5"/>
    <text x="1050" y="125" text-anchor="middle" fill="#7dd3fc" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="700">FGCP</text>
    <text x="1050" y="143" text-anchor="middle" fill="#dde6f1" font-family="Inter, system-ui, sans-serif" font-size="10">Flight Guidance Control Panel</text>
    <text x="1050" y="162" text-anchor="middle" fill="#a3b3c6" font-family="Inter, system-ui, sans-serif" font-size="9">AP · YD · HDG · NAV · APPR</text>
    <text x="1050" y="178" text-anchor="middle" fill="#a3b3c6" font-family="Inter, system-ui, sans-serif" font-size="9">IAS · VS · VNAV · ALT · ALT SEL</text>

    <!-- Glareshield AP DISENG lights -->
    <rect x="940" y="220" width="220" height="80" rx="10" fill="#0a1322" stroke="#dc2626" stroke-width="2"/>
    <text x="1050" y="245" text-anchor="middle" fill="#fca5a5" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="700">GLARESHIELD</text>
    <circle cx="990" cy="270" r="12" fill="#7f1d1d" stroke="#dc2626" stroke-width="1.5"/>
    <text x="990" y="274" text-anchor="middle" fill="#fca5a5" font-family="Inter, system-ui, sans-serif" font-size="9" font-weight="700">A/P</text>
    <text x="990" y="292" text-anchor="middle" fill="#fca5a5" font-family="Inter, system-ui, sans-serif" font-size="8">capt</text>
    <circle cx="1110" cy="270" r="12" fill="#7f1d1d" stroke="#dc2626" stroke-width="1.5"/>
    <text x="1110" y="274" text-anchor="middle" fill="#fca5a5" font-family="Inter, system-ui, sans-serif" font-size="9" font-weight="700">A/P</text>
    <text x="1110" y="292" text-anchor="middle" fill="#fca5a5" font-family="Inter, system-ui, sans-serif" font-size="8">FO</text>
    <text x="1050" y="272" text-anchor="middle" fill="#fbbf24" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="700">DISENG</text>

    <!-- AP DIS pushbuttons (control wheels) -->
    <rect x="940" y="330" width="220" height="80" rx="10" fill="#0a1322" stroke="#7a8aa6" stroke-width="1.5"/>
    <text x="1050" y="355" text-anchor="middle" fill="#dde6f1" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="700">CONTROL WHEELS</text>
    <text x="1050" y="375" text-anchor="middle" fill="#a3b3c6" font-family="Inter, system-ui, sans-serif" font-size="10">AP DIS pushbutton (each side)</text>
    <text x="1050" y="392" text-anchor="middle" fill="#a3b3c6" font-family="Inter, system-ui, sans-serif" font-size="9">disengage · ack warnings · TCS</text>
  </g>

  <!-- FGCP -> FGMs -->
  <g stroke="#7dd3fc" stroke-width="1.5" fill="none" marker-end="url(#arrow)" stroke-dasharray="4 3">
    <path d="M 940 145 L 460 200"/>
  </g>

  <!-- AP DIS -> FGMs (acknowledge path) -->
  <g stroke="#7a8aa6" stroke-width="1.5" fill="none" marker-end="url(#arrow)" stroke-dasharray="3 2">
    <path d="M 940 370 L 460 320"/>
  </g>

  <!-- ==================== FMA strip (bottom) ==================== -->
  <g>
    <rect x="40" y="445" width="1120" height="60" rx="10" fill="#0a1322" stroke="#3a4a66" stroke-width="1.5"/>
    <text x="80" y="465" fill="#dde6f1" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="700">PFD · FLIGHT MODE ANNUNCIATOR (FMA)</text>

    <!-- Lateral armed -->
    <text x="180" y="490" text-anchor="middle" fill="#dde6f1" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="700">VOR APP</text>
    <text x="180" y="503" text-anchor="middle" fill="#7a8aa6" font-family="Inter, system-ui, sans-serif" font-size="9">lateral armed (white)</text>
    <!-- Lateral active -->
    <text x="320" y="490" text-anchor="middle" fill="#22c55e" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="700">NAV</text>
    <text x="320" y="503" text-anchor="middle" fill="#7a8aa6" font-family="Inter, system-ui, sans-serif" font-size="9">lateral active (green)</text>
    <!-- Vertical armed -->
    <text x="500" y="490" text-anchor="middle" fill="#dde6f1" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="700">ALT SEL</text>
    <text x="500" y="503" text-anchor="middle" fill="#7a8aa6" font-family="Inter, system-ui, sans-serif" font-size="9">vertical armed (white)</text>
    <!-- Vertical active -->
    <text x="660" y="490" text-anchor="middle" fill="#22c55e" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="700">VS</text>
    <text x="660" y="503" text-anchor="middle" fill="#7a8aa6" font-family="Inter, system-ui, sans-serif" font-size="9">vertical active (green)</text>
    <!-- VNAV submodes -->
    <text x="820" y="490" text-anchor="middle" fill="#22c55e" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="700">VNAV PATH</text>
    <text x="820" y="503" text-anchor="middle" fill="#7a8aa6" font-family="Inter, system-ui, sans-serif" font-size="9">VNAV submode (green)</text>
    <!-- AP / YD / mistrim -->
    <text x="990" y="490" text-anchor="middle" fill="#22c55e" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="700">AP   YD</text>
    <text x="990" y="503" text-anchor="middle" fill="#7a8aa6" font-family="Inter, system-ui, sans-serif" font-size="9">engaged (green)</text>
    <text x="1110" y="490" text-anchor="middle" fill="#fbbf24" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="700">MISTRIM</text>
    <text x="1110" y="503" text-anchor="middle" fill="#7a8aa6" font-family="Inter, system-ui, sans-serif" font-size="9">amber (annunciation only)</text>
  </g>

  <!-- ==================== Engagement-limits callout (bottom) ==================== -->
  <g>
    <rect x="40" y="525" width="540" height="55" rx="8" fill="#0a1322" stroke="#7a8aa6" stroke-width="1" stroke-dasharray="3 2"/>
    <text x="60" y="545" fill="#dde6f1" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="700">ENGAGEMENT LIMITS</text>
    <text x="60" y="563" fill="#a3b3c6" font-family="Inter, system-ui, sans-serif" font-size="11">AP: roll ±45° · pitch ±20°  |  YD: roll ±45° only</text>

    <rect x="600" y="525" width="560" height="55" rx="8" fill="#0a1322" stroke="#7a8aa6" stroke-width="1" stroke-dasharray="3 2"/>
    <text x="620" y="545" fill="#dde6f1" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="700">PITCH TRIM SCHEDULE</text>
    <text x="620" y="563" fill="#a3b3c6" font-family="Inter, system-ui, sans-serif" font-size="11">HIGH below 180 KCAS · LOW above. Manual trim with AP engaged = AP DISENGAGES.</text>
  </g>

  <!-- ==================== HOTSPOTS ==================== -->
  <g font-family="Inter, system-ui, sans-serif" font-weight="700">
    <g class="hotspot" data-id="h1"><circle cx="115" cy="120" r="10" fill="#fbbf24" stroke="#0e1b2c" stroke-width="1.5"/><text x="115" y="124" font-size="11" fill="#0e1b2c" text-anchor="middle">1</text></g>
    <g class="hotspot" data-id="h2"><circle cx="115" cy="240" r="10" fill="#fbbf24" stroke="#0e1b2c" stroke-width="1.5"/><text x="115" y="244" font-size="11" fill="#0e1b2c" text-anchor="middle">2</text></g>
    <g class="hotspot" data-id="h3"><circle cx="365" cy="205" r="11" fill="#22d3ee" stroke="#0e1b2c" stroke-width="1.5"/><text x="365" y="209" font-size="11" fill="#0e1b2c" text-anchor="middle">3</text></g>
    <g class="hotspot" data-id="h4"><circle cx="365" cy="335" r="11" fill="#a78bfa" stroke="#0e1b2c" stroke-width="1.5"/><text x="365" y="339" font-size="11" fill="#fff" text-anchor="middle">4</text></g>
    <g class="hotspot" data-id="h5"><circle cx="590" cy="220" r="11" fill="#22d3ee" stroke="#0e1b2c" stroke-width="1.5"/><text x="590" y="224" font-size="11" fill="#0e1b2c" text-anchor="middle">5</text></g>
    <g class="hotspot" data-id="h6"><circle cx="590" cy="330" r="11" fill="#22d3ee" stroke="#0e1b2c" stroke-width="1.5"/><text x="590" y="334" font-size="11" fill="#0e1b2c" text-anchor="middle">6</text></g>
    <g class="hotspot" data-id="h7"><circle cx="815" cy="220" r="10" fill="#22c55e" stroke="#0e1b2c" stroke-width="1.5"/><text x="815" y="224" font-size="11" fill="#0e1b2c" text-anchor="middle">7</text></g>
    <g class="hotspot" data-id="h8"><circle cx="815" cy="330" r="10" fill="#22c55e" stroke="#0e1b2c" stroke-width="1.5"/><text x="815" y="334" font-size="11" fill="#0e1b2c" text-anchor="middle">8</text></g>
    <g class="hotspot" data-id="h9"><circle cx="1050" cy="145" r="10" fill="#7dd3fc" stroke="#0e1b2c" stroke-width="1.5"/><text x="1050" y="149" font-size="11" fill="#0e1b2c" text-anchor="middle">9</text></g>
    <g class="hotspot" data-id="h10"><circle cx="990" cy="270" r="10" fill="#dc2626" stroke="#0e1b2c" stroke-width="1.5"/><text x="990" y="274" font-size="11" fill="#fff" text-anchor="middle">10</text></g>
    <g class="hotspot" data-id="h11"><circle cx="1110" cy="270" r="10" fill="#dc2626" stroke="#0e1b2c" stroke-width="1.5"/><text x="1110" y="274" font-size="11" fill="#fff" text-anchor="middle">11</text></g>
    <g class="hotspot" data-id="h12"><circle cx="1050" cy="370" r="10" fill="#7a8aa6" stroke="#0e1b2c" stroke-width="1.5"/><text x="1050" y="374" font-size="11" fill="#0e1b2c" text-anchor="middle">12</text></g>
    <g class="hotspot" data-id="h13"><circle cx="320" cy="487" r="9" fill="#22c55e" stroke="#0e1b2c" stroke-width="1.5"/><text x="320" y="491" font-size="10" fill="#0e1b2c" text-anchor="middle">13</text></g>
    <g class="hotspot" data-id="h14"><circle cx="1110" cy="487" r="9" fill="#fbbf24" stroke="#0e1b2c" stroke-width="1.5"/><text x="1110" y="491" font-size="10" fill="#0e1b2c" text-anchor="middle">14</text></g>
  </g>
</svg>
