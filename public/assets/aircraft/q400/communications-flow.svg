<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 600" role="img" aria-label="Q400 communications block diagram: ARMS umbrella with two ARCDUs, three VHFs, ELT, ACARS, CVR, FDR">
  <title>Q400 Communications and Audio Flow</title>
  <desc>Architecture of the Q400 Audio and Radio Management System with two ARCDUs feeding three VHFs and HF, the dedicated 3rd VHF for ACARS, the VHF1 Standby Control and Display Unit as backup, audio panels with PTT mute logic, ELT with three frequencies and 5 to 7 G inertia trigger, and the solid-state CVR recording the last 2 hours.</desc>

  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#0e1b2c"/><stop offset="1" stop-color="#0a1322"/></linearGradient>
    <linearGradient id="boxFill" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#1c2a40"/><stop offset="1" stop-color="#0e1b2c"/></linearGradient>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M 0 0 L 10 5 L 0 10 Z" fill="#7dd3fc"/></marker>
    <marker id="arrowAck" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M 0 0 L 10 5 L 0 10 Z" fill="#22c55e"/></marker>
  </defs>

  <rect width="1200" height="600" fill="url(#bg)"/>

  <text x="600" y="36" text-anchor="middle" fill="#dde6f1" font-family="Inter, system-ui, sans-serif" font-size="20" font-weight="700">Q400 Communications System</text>
  <text x="600" y="58" text-anchor="middle" fill="#7a8aa6" font-family="Inter, system-ui, sans-serif" font-size="12">ARMS umbrella · Two ARCDUs · Three VHFs · ELT · ACARS · CVR · FDR</text>

  <!-- ARMS umbrella label -->
  <g>
    <rect x="40" y="85" width="1120" height="30" rx="8" fill="#1c2a40" stroke="#22d3ee" stroke-width="1.5" stroke-dasharray="6 4"/>
    <text x="600" y="105" text-anchor="middle" fill="#22d3ee" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="700">ARMS · Audio and Radio Management System (RCOM + PACIS + AIS)</text>
  </g>

  <!-- ARCDUs (centre) -->
  <g font-family="Inter, system-ui, sans-serif">
    <rect x="280" y="140" width="200" height="100" rx="10" fill="#142339" stroke="#22d3ee" stroke-width="2"/>
    <text x="380" y="165" text-anchor="middle" fill="#22d3ee" font-size="14" font-weight="700">ARCDU 1</text>
    <text x="380" y="183" text-anchor="middle" fill="#7dd3fc" font-size="10">captain side</text>
    <rect x="300" y="195" width="160" height="20" rx="3" fill="#0a1322" stroke="#22c55e" stroke-width="1"/>
    <text x="380" y="210" text-anchor="middle" fill="#22c55e" font-size="11" font-weight="700">126.500</text>
    <text x="320" y="232" text-anchor="middle" fill="#a3b3c6" font-size="8">ACTIVE green</text>
    <text x="440" y="232" text-anchor="middle" fill="#22d3ee" font-size="10">VHF1</text>

    <rect x="720" y="140" width="200" height="100" rx="10" fill="#142339" stroke="#22d3ee" stroke-width="2"/>
    <text x="820" y="165" text-anchor="middle" fill="#22d3ee" font-size="14" font-weight="700">ARCDU 2</text>
    <text x="820" y="183" text-anchor="middle" fill="#7dd3fc" font-size="10">FO side</text>
    <rect x="740" y="195" width="160" height="20" rx="3" fill="#0a1322" stroke="#22d3ee" stroke-width="1"/>
    <text x="820" y="210" text-anchor="middle" fill="#22d3ee" font-size="11" font-weight="700">122.800</text>
    <text x="760" y="232" text-anchor="middle" fill="#a3b3c6" font-size="8">PRESET cyan</text>
    <text x="880" y="232" text-anchor="middle" fill="#22d3ee" font-size="10">VHF2</text>
  </g>

  <!-- VHF1 Standby (backup) -->
  <g>
    <rect x="40" y="155" width="200" height="70" rx="10" fill="#0a1322" stroke="#fbbf24" stroke-width="1.5" stroke-dasharray="4 3"/>
    <text x="140" y="180" text-anchor="middle" fill="#fcd34d" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="700">VHF1 STANDBY</text>
    <text x="140" y="197" text-anchor="middle" fill="#fbbf24" font-family="Inter, system-ui, sans-serif" font-size="10">Control + Display</text>
    <text x="140" y="213" text-anchor="middle" fill="#a3b3c6" font-family="Inter, system-ui, sans-serif" font-size="9">OFF / ON / TEST</text>
  </g>

  <!-- HF block -->
  <g>
    <rect x="960" y="155" width="200" height="70" rx="10" fill="url(#boxFill)" stroke="#7dd3fc" stroke-width="1.5"/>
    <text x="1060" y="180" text-anchor="middle" fill="#7dd3fc" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="700">HF (optional)</text>
    <text x="1060" y="197" text-anchor="middle" fill="#a3b3c6" font-family="Inter, system-ui, sans-serif" font-size="10">long-range comms</text>
  </g>

  <!-- VHF row (centre) -->
  <g>
    <rect x="280" y="280" width="120" height="60" rx="8" fill="url(#boxFill)" stroke="#7dd3fc" stroke-width="1.5"/>
    <text x="340" y="304" text-anchor="middle" fill="#7dd3fc" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="700">VHF 1</text>
    <text x="340" y="322" text-anchor="middle" fill="#a3b3c6" font-family="Inter, system-ui, sans-serif" font-size="10">voice + nav</text>

    <rect x="430" y="280" width="120" height="60" rx="8" fill="url(#boxFill)" stroke="#7dd3fc" stroke-width="1.5"/>
    <text x="490" y="304" text-anchor="middle" fill="#7dd3fc" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="700">VHF 2</text>
    <text x="490" y="322" text-anchor="middle" fill="#a3b3c6" font-family="Inter, system-ui, sans-serif" font-size="10">voice</text>

    <rect x="580" y="280" width="180" height="60" rx="8" fill="url(#boxFill)" stroke="#a78bfa" stroke-width="1.5"/>
    <text x="670" y="304" text-anchor="middle" fill="#a78bfa" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="700">VHF 3 (ACARS)</text>
    <text x="670" y="322" text-anchor="middle" fill="#c4b5fd" font-family="Inter, system-ui, sans-serif" font-size="10">data only · no voice</text>
  </g>

  <!-- ARCDU → VHF lines -->
  <g stroke="#22d3ee" stroke-width="1.5" fill="none" marker-end="url(#arrow)">
    <path d="M 380 240 L 360 280"/>
    <path d="M 820 240 L 510 280"/>
  </g>

  <!-- VHF1 standby → VHF1 backup line -->
  <g stroke="#fbbf24" stroke-width="1.5" stroke-dasharray="3 2" fill="none" marker-end="url(#arrow)">
    <path d="M 140 225 L 320 280"/>
  </g>

  <!-- ACARS flow -->
  <g stroke="#a78bfa" stroke-width="2" fill="none" marker-end="url(#arrow)" stroke-dasharray="3 2">
    <path d="M 670 340 L 670 380 L 870 380"/>
  </g>
  <text x="765" y="372" text-anchor="middle" fill="#c4b5fd" font-family="Inter, system-ui, sans-serif" font-size="9">data link</text>

  <!-- ACARS box -->
  <g>
    <rect x="870" y="360" width="170" height="50" rx="8" fill="url(#boxFill)" stroke="#a78bfa" stroke-width="1.5"/>
    <text x="955" y="382" text-anchor="middle" fill="#a78bfa" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="700">ACARS</text>
    <text x="955" y="398" text-anchor="middle" fill="#c4b5fd" font-family="Inter, system-ui, sans-serif" font-size="9">Allied Signal MK II + Globalstar</text>
  </g>

  <!-- ELT -->
  <g>
    <rect x="40" y="280" width="200" height="80" rx="10" fill="#0a1322" stroke="#dc2626" stroke-width="1.8"/>
    <text x="140" y="305" text-anchor="middle" fill="#fca5a5" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="700">ELT</text>
    <text x="140" y="322" text-anchor="middle" fill="#fbbf24" font-family="Inter, system-ui, sans-serif" font-size="10">Kannad 406 · COSPAS/SARSAT</text>
    <text x="140" y="338" text-anchor="middle" fill="#a3b3c6" font-family="Inter, system-ui, sans-serif" font-size="10">121.5 / 243 / 406 MHz</text>
    <text x="140" y="354" text-anchor="middle" fill="#fcd34d" font-family="Inter, system-ui, sans-serif" font-size="10" font-weight="700">5–7 G longitudinal trigger</text>
  </g>

  <!-- CVR + FDR -->
  <g>
    <rect x="40" y="395" width="200" height="60" rx="10" fill="url(#boxFill)" stroke="#22c55e" stroke-width="1.5"/>
    <text x="140" y="418" text-anchor="middle" fill="#86efac" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="700">SSCVR</text>
    <text x="140" y="436" text-anchor="middle" fill="#22c55e" font-family="Inter, system-ui, sans-serif" font-size="10">last 2 hours · solid state</text>

    <rect x="280" y="395" width="200" height="60" rx="10" fill="url(#boxFill)" stroke="#22c55e" stroke-width="1.5"/>
    <text x="380" y="418" text-anchor="middle" fill="#86efac" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="700">FDR</text>
    <text x="380" y="436" text-anchor="middle" fill="#22c55e" font-family="Inter, system-ui, sans-serif" font-size="10">GND TEST switch</text>
  </g>

  <!-- Audio panels -->
  <g>
    <rect x="520" y="395" width="280" height="60" rx="10" fill="#0a1322" stroke="#7a8aa6" stroke-width="1.2"/>
    <text x="660" y="418" text-anchor="middle" fill="#dde6f1" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="700">AUDIO PANELS</text>
    <text x="660" y="436" text-anchor="middle" fill="#a3b3c6" font-family="Inter, system-ui, sans-serif" font-size="9">control wheels · side panel · steering · observer (interlocked)</text>
  </g>

  <!-- PTT mute reminder -->
  <g>
    <rect x="820" y="395" width="220" height="60" rx="10" fill="#0a1322" stroke="#fbbf24" stroke-width="1.2" stroke-dasharray="3 2"/>
    <text x="930" y="418" text-anchor="middle" fill="#fcd34d" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="700">PTT MUTE</text>
    <text x="930" y="436" text-anchor="middle" fill="#a3b3c6" font-family="Inter, system-ui, sans-serif" font-size="9">flight-deck speakers –6 dB on transmit</text>
  </g>

  <!-- Bottom callouts -->
  <g font-family="Inter, system-ui, sans-serif">
    <rect x="40" y="490" width="540" height="80" rx="8" fill="#0a1322" stroke="#3a4a66" stroke-width="1"/>
    <text x="60" y="510" fill="#dde6f1" font-size="11" font-weight="700">ARCDU FREQUENCY COLOURS</text>
    <text x="60" y="530" fill="#a3b3c6" font-size="11">ACTIVE: GREEN (valid data) · WHITE (invalid / no data)</text>
    <text x="60" y="548" fill="#a3b3c6" font-size="11">PRESET: CYAN · highlighted black-on-cyan = tune window</text>
    <text x="60" y="565" fill="#a3b3c6" font-size="11">Highlight reverts after 5 seconds of inactivity</text>

    <rect x="600" y="490" width="560" height="80" rx="8" fill="#0a1322" stroke="#3a4a66" stroke-width="1"/>
    <text x="620" y="510" fill="#dde6f1" font-size="11" font-weight="700">ELT REMOTE SWITCH</text>
    <text x="620" y="530" fill="#a3b3c6" font-size="11">ON: manual override (forces transmit) · ARMED: automatic via inertia</text>
    <text x="620" y="548" fill="#a3b3c6" font-size="11">RESET &amp; TEST: momentary, re-arms ELT and clears monitor light</text>
    <text x="620" y="565" fill="#a3b3c6" font-size="11">Monitor light: 1 long flash / 3 sec = normal · short flashes = fault</text>
  </g>

  <!-- HOTSPOTS -->
  <g font-family="Inter, system-ui, sans-serif" font-weight="700">
    <g class="hotspot" data-id="h1"><circle cx="380" cy="190" r="11" fill="#22d3ee" stroke="#0e1b2c" stroke-width="1.5"/><text x="380" y="194" font-size="11" fill="#0e1b2c" text-anchor="middle">1</text></g>
    <g class="hotspot" data-id="h2"><circle cx="820" cy="190" r="11" fill="#22d3ee" stroke="#0e1b2c" stroke-width="1.5"/><text x="820" y="194" font-size="11" fill="#0e1b2c" text-anchor="middle">2</text></g>
    <g class="hotspot" data-id="h3"><circle cx="140" cy="195" r="11" fill="#fbbf24" stroke="#0e1b2c" stroke-width="1.5"/><text x="140" y="199" font-size="11" fill="#0e1b2c" text-anchor="middle">3</text></g>
    <g class="hotspot" data-id="h4"><circle cx="1060" cy="195" r="11" fill="#7dd3fc" stroke="#0e1b2c" stroke-width="1.5"/><text x="1060" y="199" font-size="11" fill="#0e1b2c" text-anchor="middle">4</text></g>
    <g class="hotspot" data-id="h5"><circle cx="340" cy="310" r="11" fill="#7dd3fc" stroke="#0e1b2c" stroke-width="1.5"/><text x="340" y="314" font-size="11" fill="#0e1b2c" text-anchor="middle">5</text></g>
    <g class="hotspot" data-id="h6"><circle cx="490" cy="310" r="11" fill="#7dd3fc" stroke="#0e1b2c" stroke-width="1.5"/><text x="490" y="314" font-size="11" fill="#0e1b2c" text-anchor="middle">6</text></g>
    <g class="hotspot" data-id="h7"><circle cx="670" cy="310" r="11" fill="#a78bfa" stroke="#0e1b2c" stroke-width="1.5"/><text x="670" y="314" font-size="11" fill="#fff" text-anchor="middle">7</text></g>
    <g class="hotspot" data-id="h8"><circle cx="955" cy="385" r="11" fill="#a78bfa" stroke="#0e1b2c" stroke-width="1.5"/><text x="955" y="389" font-size="11" fill="#fff" text-anchor="middle">8</text></g>
    <g class="hotspot" data-id="h9"><circle cx="140" cy="320" r="11" fill="#dc2626" stroke="#0e1b2c" stroke-width="1.5"/><text x="140" y="324" font-size="11" fill="#fff" text-anchor="middle">9</text></g>
    <g class="hotspot" data-id="h10"><circle cx="140" cy="425" r="11" fill="#22c55e" stroke="#0e1b2c" stroke-width="1.5"/><text x="140" y="429" font-size="11" fill="#0e1b2c" text-anchor="middle">10</text></g>
    <g class="hotspot" data-id="h11"><circle cx="380" cy="425" r="11" fill="#22c55e" stroke="#0e1b2c" stroke-width="1.5"/><text x="380" y="429" font-size="11" fill="#0e1b2c" text-anchor="middle">11</text></g>
    <g class="hotspot" data-id="h12"><circle cx="660" cy="425" r="11" fill="#7a8aa6" stroke="#0e1b2c" stroke-width="1.5"/><text x="660" y="429" font-size="11" fill="#0e1b2c" text-anchor="middle">12</text></g>
    <g class="hotspot" data-id="h13"><circle cx="930" cy="425" r="11" fill="#fbbf24" stroke="#0e1b2c" stroke-width="1.5"/><text x="930" y="429" font-size="11" fill="#0e1b2c" text-anchor="middle">13</text></g>
    <g class="hotspot" data-id="h14"><circle cx="1140" cy="510" r="11" fill="#dc2626" stroke="#0e1b2c" stroke-width="1.5"/><text x="1140" y="514" font-size="11" fill="#fff" text-anchor="middle">14</text></g>
  </g>
</svg>
