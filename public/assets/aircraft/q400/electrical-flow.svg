<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 600" role="img" aria-label="Q400 EPGDS architecture: AC generators, TRUs, DC starter generators, three NiCad batteries, APU starter generator, EPCU brain, bus topology">
  <title>Q400 EPGDS Architecture</title>
  <desc>Block diagram of the Electrical Power Generation and Distribution System. Two engine-driven AC generators feed two variable-frequency buses, each driving a TRU that produces 28 VDC. Two engine-driven DC starter-generators directly feed DC buses. Three NiCad batteries (two 40 Amp-hour main and aux, plus a 17 Amp-hour standby) provide backup. An APU starter-generator in the tail cone supports ground operations. The EPCU manages bus tie contactors automatically.</desc>

  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#0e1b2c"/><stop offset="1" stop-color="#0a1322"/></linearGradient>
    <linearGradient id="boxFill" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#1c2a40"/><stop offset="1" stop-color="#0e1b2c"/></linearGradient>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M 0 0 L 10 5 L 0 10 Z" fill="#7dd3fc"/></marker>
    <marker id="arrowAC" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M 0 0 L 10 5 L 0 10 Z" fill="#fbbf24"/></marker>
    <marker id="arrowDC" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M 0 0 L 10 5 L 0 10 Z" fill="#22d3ee"/></marker>
  </defs>

  <rect width="1200" height="600" fill="url(#bg)"/>

  <text x="600" y="36" text-anchor="middle" fill="#dde6f1" font-family="Inter, system-ui, sans-serif" font-size="20" font-weight="700">Q400 EPGDS Architecture</text>
  <text x="600" y="58" text-anchor="middle" fill="#7a8aa6" font-family="Inter, system-ui, sans-serif" font-size="12">2 AC gens · 2 DC starter-gens · 2 TRUs · 3 NiCads · APU · EPCU brain</text>

  <!-- AC GEN row -->
  <g font-family="Inter, system-ui, sans-serif">
    <rect x="40" y="100" width="160" height="60" rx="8" fill="url(#boxFill)" stroke="#fbbf24" stroke-width="1.8"/>
    <text x="120" y="123" text-anchor="middle" fill="#fcd34d" font-size="13" font-weight="700">AC GEN 1</text>
    <text x="120" y="143" text-anchor="middle" fill="#fbbf24" font-size="10">115 VAC variable freq</text>

    <rect x="220" y="100" width="160" height="60" rx="8" fill="url(#boxFill)" stroke="#fbbf24" stroke-width="1.8"/>
    <text x="300" y="123" text-anchor="middle" fill="#fcd34d" font-size="13" font-weight="700">AC GEN 2</text>
    <text x="300" y="143" text-anchor="middle" fill="#fbbf24" font-size="10">115 VAC variable freq</text>

    <!-- TRUs -->
    <rect x="40" y="190" width="160" height="50" rx="8" fill="url(#boxFill)" stroke="#a78bfa" stroke-width="1.5"/>
    <text x="120" y="213" text-anchor="middle" fill="#a78bfa" font-size="13" font-weight="700">TRU 1</text>
    <text x="120" y="230" text-anchor="middle" fill="#c4b5fd" font-size="10">AC → 28 VDC</text>

    <rect x="220" y="190" width="160" height="50" rx="8" fill="url(#boxFill)" stroke="#a78bfa" stroke-width="1.5"/>
    <text x="300" y="213" text-anchor="middle" fill="#a78bfa" font-size="13" font-weight="700">TRU 2</text>
    <text x="300" y="230" text-anchor="middle" fill="#c4b5fd" font-size="10">AC → 28 VDC</text>
  </g>

  <!-- AC → TRU lines -->
  <g stroke="#fbbf24" stroke-width="1.5" fill="none" marker-end="url(#arrowAC)">
    <path d="M 120 160 L 120 190"/>
    <path d="M 300 160 L 300 190"/>
  </g>

  <!-- DC GEN row -->
  <g font-family="Inter, system-ui, sans-serif">
    <rect x="450" y="100" width="180" height="60" rx="8" fill="url(#boxFill)" stroke="#22d3ee" stroke-width="1.8"/>
    <text x="540" y="123" text-anchor="middle" fill="#22d3ee" font-size="13" font-weight="700">DC GEN 1</text>
    <text x="540" y="143" text-anchor="middle" fill="#7dd3fc" font-size="10">starter/generator · 28 VDC</text>

    <rect x="650" y="100" width="180" height="60" rx="8" fill="url(#boxFill)" stroke="#22d3ee" stroke-width="1.8"/>
    <text x="740" y="123" text-anchor="middle" fill="#22d3ee" font-size="13" font-weight="700">DC GEN 2</text>
    <text x="740" y="143" text-anchor="middle" fill="#7dd3fc" font-size="10">starter/generator · 28 VDC</text>
  </g>

  <!-- EPCU centre brain -->
  <g>
    <rect x="450" y="200" width="380" height="80" rx="10" fill="#142339" stroke="#22c55e" stroke-width="2.2"/>
    <text x="640" y="225" text-anchor="middle" fill="#86efac" font-family="Inter, system-ui, sans-serif" font-size="15" font-weight="700">EPCU</text>
    <text x="640" y="245" text-anchor="middle" fill="#22c55e" font-family="Inter, system-ui, sans-serif" font-size="11">Electrical Power Control Unit</text>
    <text x="640" y="263" text-anchor="middle" fill="#a3b3c6" font-family="Inter, system-ui, sans-serif" font-size="10">monitors all sources · auto bus-tie reconfiguration · 5-sec fault tolerance</text>
  </g>

  <!-- Source → EPCU lines -->
  <g stroke="#22d3ee" stroke-width="1.5" fill="none" marker-end="url(#arrowDC)" stroke-dasharray="3 2">
    <path d="M 540 160 L 540 200"/>
    <path d="M 740 160 L 740 200"/>
    <path d="M 200 215 L 450 235"/>
    <path d="M 380 215 L 450 245"/>
  </g>

  <!-- DC bus row -->
  <g font-family="Inter, system-ui, sans-serif">
    <rect x="60" y="320" width="220" height="50" rx="8" fill="#0a1322" stroke="#7dd3fc" stroke-width="1.5"/>
    <text x="170" y="343" text-anchor="middle" fill="#7dd3fc" font-size="13" font-weight="700">DC BUS 1</text>
    <text x="170" y="360" text-anchor="middle" fill="#a3b3c6" font-size="10">main bus 1</text>

    <rect x="320" y="320" width="220" height="50" rx="8" fill="#0a1322" stroke="#7dd3fc" stroke-width="1.5"/>
    <text x="430" y="343" text-anchor="middle" fill="#7dd3fc" font-size="13" font-weight="700">DC BUS 2</text>
    <text x="430" y="360" text-anchor="middle" fill="#a3b3c6" font-size="10">main bus 2</text>

    <rect x="580" y="320" width="220" height="50" rx="8" fill="#0a1322" stroke="#22c55e" stroke-width="1.5"/>
    <text x="690" y="343" text-anchor="middle" fill="#86efac" font-size="13" font-weight="700">ESS BUS</text>
    <text x="690" y="360" text-anchor="middle" fill="#22c55e" font-size="10">essential</text>

    <rect x="840" y="320" width="220" height="50" rx="8" fill="#0a1322" stroke="#22c55e" stroke-width="1.5"/>
    <text x="950" y="343" text-anchor="middle" fill="#86efac" font-size="13" font-weight="700">ESS STANDBY</text>
    <text x="950" y="360" text-anchor="middle" fill="#22c55e" font-size="10">standby (17 Ahr)</text>
  </g>

  <!-- Bus tie connection markers -->
  <g stroke="#22c55e" stroke-width="1.5" stroke-dasharray="3 2" fill="none">
    <path d="M 280 345 L 320 345"/>
    <path d="M 540 345 L 580 345"/>
    <path d="M 800 345 L 840 345"/>
  </g>
  <text x="600" y="305" text-anchor="middle" fill="#86efac" font-family="Inter, system-ui, sans-serif" font-size="9">bus tie contactors managed by EPCU</text>

  <!-- EPCU → buses -->
  <g stroke="#22c55e" stroke-width="1.5" fill="none" marker-end="url(#arrow)">
    <path d="M 640 280 L 170 320"/>
    <path d="M 640 280 L 430 320"/>
    <path d="M 640 280 L 690 320"/>
    <path d="M 640 280 L 950 320"/>
  </g>

  <!-- Battery row -->
  <g font-family="Inter, system-ui, sans-serif">
    <rect x="60" y="395" width="160" height="60" rx="8" fill="url(#boxFill)" stroke="#dc2626" stroke-width="1.5"/>
    <text x="140" y="418" text-anchor="middle" fill="#fca5a5" font-size="12" font-weight="700">MAIN BATT</text>
    <text x="140" y="436" text-anchor="middle" fill="#fbbf24" font-size="10">40 Ahr NiCad</text>

    <rect x="240" y="395" width="160" height="60" rx="8" fill="url(#boxFill)" stroke="#dc2626" stroke-width="1.5"/>
    <text x="320" y="418" text-anchor="middle" fill="#fca5a5" font-size="12" font-weight="700">AUX BATT</text>
    <text x="320" y="436" text-anchor="middle" fill="#fbbf24" font-size="10">40 Ahr NiCad</text>

    <rect x="420" y="395" width="160" height="60" rx="8" fill="url(#boxFill)" stroke="#dc2626" stroke-width="1.5"/>
    <text x="500" y="418" text-anchor="middle" fill="#fca5a5" font-size="12" font-weight="700">STBY BATT</text>
    <text x="500" y="436" text-anchor="middle" fill="#fbbf24" font-size="10">17 Ahr (fwd fuselage)</text>

    <!-- APU -->
    <rect x="620" y="395" width="180" height="60" rx="8" fill="url(#boxFill)" stroke="#a78bfa" stroke-width="1.5"/>
    <text x="710" y="418" text-anchor="middle" fill="#a78bfa" font-size="13" font-weight="700">APU STARTER/GEN</text>
    <text x="710" y="436" text-anchor="middle" fill="#c4b5fd" font-size="10">tail cone · 28 VDC ground</text>
  </g>

  <!-- External power -->
  <g font-family="Inter, system-ui, sans-serif">
    <rect x="840" y="395" width="220" height="60" rx="8" fill="#0a1322" stroke="#22c55e" stroke-width="1.5" stroke-dasharray="3 2"/>
    <text x="950" y="418" text-anchor="middle" fill="#86efac" font-size="13" font-weight="700">EXTERNAL POWER</text>
    <text x="950" y="436" text-anchor="middle" fill="#22c55e" font-size="10">DC LEFT · AC RIGHT (fwd) · AC PPU</text>
  </g>

  <!-- Bottom callouts -->
  <g font-family="Inter, system-ui, sans-serif">
    <rect x="40" y="490" width="540" height="80" rx="8" fill="#0a1322" stroke="#3a4a66" stroke-width="1"/>
    <text x="60" y="510" fill="#dde6f1" font-size="11" font-weight="700">BUS-FAULT TIMING</text>
    <text x="60" y="530" fill="#a3b3c6" font-size="11">DC BUS caution → 5-second tolerance window</text>
    <text x="60" y="548" fill="#a3b3c6" font-size="11">If persistent → EPCU TRIPs generator + locks-out battery contactors</text>
    <text x="60" y="565" fill="#fcd34d" font-size="11">Mnemonic: BUS · 5-sec · GEN trip · BATT lockout</text>

    <rect x="600" y="490" width="560" height="80" rx="8" fill="#0a1322" stroke="#3a4a66" stroke-width="1"/>
    <text x="620" y="510" fill="#dde6f1" font-size="11" font-weight="700">BATTERY VOLTAGES</text>
    <text x="620" y="530" fill="#a3b3c6" font-size="11">40 Ahr nominal 24 VDC under load (20 cells × 1.2 VDC)</text>
    <text x="620" y="548" fill="#a3b3c6" font-size="11">Charging needs 28-32 VDC. Below 28 VDC GPU → batteries discharge</text>
    <text x="620" y="565" fill="#fcd34d" font-size="11">MFD AC GEN LOAD: 1.00 = 100% · "+" prefix = overload</text>
  </g>

  <!-- HOTSPOTS -->
  <g font-family="Inter, system-ui, sans-serif" font-weight="700">
    <g class="hotspot" data-id="h1"><circle cx="120" cy="130" r="11" fill="#fbbf24" stroke="#0e1b2c" stroke-width="1.5"/><text x="120" y="134" font-size="11" fill="#0e1b2c" text-anchor="middle">1</text></g>
    <g class="hotspot" data-id="h2"><circle cx="300" cy="130" r="11" fill="#fbbf24" stroke="#0e1b2c" stroke-width="1.5"/><text x="300" y="134" font-size="11" fill="#0e1b2c" text-anchor="middle">2</text></g>
    <g class="hotspot" data-id="h3"><circle cx="120" cy="215" r="11" fill="#a78bfa" stroke="#0e1b2c" stroke-width="1.5"/><text x="120" y="219" font-size="11" fill="#fff" text-anchor="middle">3</text></g>
    <g class="hotspot" data-id="h4"><circle cx="300" cy="215" r="11" fill="#a78bfa" stroke="#0e1b2c" stroke-width="1.5"/><text x="300" y="219" font-size="11" fill="#fff" text-anchor="middle">4</text></g>
    <g class="hotspot" data-id="h5"><circle cx="540" cy="130" r="11" fill="#22d3ee" stroke="#0e1b2c" stroke-width="1.5"/><text x="540" y="134" font-size="11" fill="#0e1b2c" text-anchor="middle">5</text></g>
    <g class="hotspot" data-id="h6"><circle cx="740" cy="130" r="11" fill="#22d3ee" stroke="#0e1b2c" stroke-width="1.5"/><text x="740" y="134" font-size="11" fill="#0e1b2c" text-anchor="middle">6</text></g>
    <g class="hotspot" data-id="h7"><circle cx="640" cy="240" r="12" fill="#22c55e" stroke="#0e1b2c" stroke-width="1.5"/><text x="640" y="244" font-size="11" fill="#0e1b2c" text-anchor="middle">7</text></g>
    <g class="hotspot" data-id="h8"><circle cx="170" cy="345" r="11" fill="#7dd3fc" stroke="#0e1b2c" stroke-width="1.5"/><text x="170" y="349" font-size="11" fill="#0e1b2c" text-anchor="middle">8</text></g>
    <g class="hotspot" data-id="h9"><circle cx="690" cy="345" r="11" fill="#22c55e" stroke="#0e1b2c" stroke-width="1.5"/><text x="690" y="349" font-size="11" fill="#0e1b2c" text-anchor="middle">9</text></g>
    <g class="hotspot" data-id="h10"><circle cx="950" cy="345" r="11" fill="#22c55e" stroke="#0e1b2c" stroke-width="1.5"/><text x="950" y="349" font-size="11" fill="#0e1b2c" text-anchor="middle">10</text></g>
    <g class="hotspot" data-id="h11"><circle cx="140" cy="425" r="11" fill="#dc2626" stroke="#0e1b2c" stroke-width="1.5"/><text x="140" y="429" font-size="11" fill="#fff" text-anchor="middle">11</text></g>
    <g class="hotspot" data-id="h12"><circle cx="500" cy="425" r="11" fill="#dc2626" stroke="#0e1b2c" stroke-width="1.5"/><text x="500" y="429" font-size="11" fill="#fff" text-anchor="middle">12</text></g>
    <g class="hotspot" data-id="h13"><circle cx="710" cy="425" r="11" fill="#a78bfa" stroke="#0e1b2c" stroke-width="1.5"/><text x="710" y="429" font-size="11" fill="#fff" text-anchor="middle">13</text></g>
    <g class="hotspot" data-id="h14"><circle cx="950" cy="425" r="11" fill="#22c55e" stroke="#0e1b2c" stroke-width="1.5"/><text x="950" y="429" font-size="11" fill="#0e1b2c" text-anchor="middle">14</text></g>
  </g>
</svg>
