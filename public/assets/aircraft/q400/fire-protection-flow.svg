<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 600" role="img" aria-label="Q400 fire protection architecture: APDs in engines and APU, smoke detectors in baggage and lavatory, two engine fire bottles in left wing root, two HRD plus shared LRD baggage bottles, lavatory Potty Bottle, four Halon 1211 portables">
  <title>Q400 Fire Protection Architecture</title>
  <desc>Schematic of the Q400 fire protection system. Six engine-nacelle APDs (three per engine: PEZ, LEZ, MWW) plus one APU APD feed the Control Amplifier. Four smoke detectors (2 aft baggage, 1 fwd baggage, 1 lavatory) feed the smoke-detection paths. Two dual-port engine fire bottles in the left wing root deliver up to two shots into either engine. Two HRD bottles plus one shared LRD bottle protect the baggage compartments. Lavatory Potty Bottle is thermally fused. Four Halon 1211 portables.</desc>

  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#0e1b2c"/><stop offset="1" stop-color="#0a1322"/></linearGradient>
    <linearGradient id="boxFill" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#1c2a40"/><stop offset="1" stop-color="#0e1b2c"/></linearGradient>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M 0 0 L 10 5 L 0 10 Z" fill="#7dd3fc"/></marker>
    <marker id="arrowFire" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M 0 0 L 10 5 L 0 10 Z" fill="#dc2626"/></marker>
    <marker id="arrowDet" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M 0 0 L 10 5 L 0 10 Z" fill="#fbbf24"/></marker>
  </defs>

  <rect width="1200" height="600" fill="url(#bg)"/>

  <text x="600" y="36" text-anchor="middle" fill="#dde6f1" font-family="Inter, system-ui, sans-serif" font-size="20" font-weight="700">Q400 Fire Protection Architecture</text>
  <text x="600" y="58" text-anchor="middle" fill="#7a8aa6" font-family="Inter, system-ui, sans-serif" font-size="12">7 APDs · 4 smoke detectors · 2 engine bottles · 2 HRD plus shared LRD baggage · Potty Bottle · 4 Halon portables</text>

  <!-- Detector row -->
  <g font-family="Inter, system-ui, sans-serif">
    <rect x="20" y="80" width="180" height="60" rx="8" fill="url(#boxFill)" stroke="#fbbf24" stroke-width="1.8"/>
    <text x="110" y="103" text-anchor="middle" fill="#fcd34d" font-size="13" font-weight="700">ENG 1 APDs</text>
    <text x="110" y="121" text-anchor="middle" fill="#fbbf24" font-size="10">PEZ · LEZ · MWW</text>
    <text x="110" y="135" text-anchor="middle" fill="#fbbf24" font-size="10">helium · 2 switches</text>

    <rect x="220" y="80" width="180" height="60" rx="8" fill="url(#boxFill)" stroke="#fbbf24" stroke-width="1.8"/>
    <text x="310" y="103" text-anchor="middle" fill="#fcd34d" font-size="13" font-weight="700">ENG 2 APDs</text>
    <text x="310" y="121" text-anchor="middle" fill="#fbbf24" font-size="10">PEZ · LEZ · MWW</text>
    <text x="310" y="135" text-anchor="middle" fill="#fbbf24" font-size="10">helium · 2 switches</text>

    <rect x="420" y="80" width="180" height="60" rx="8" fill="url(#boxFill)" stroke="#fbbf24" stroke-width="1.5"/>
    <text x="510" y="103" text-anchor="middle" fill="#fcd34d" font-size="13" font-weight="700">APU APD</text>
    <text x="510" y="121" text-anchor="middle" fill="#fbbf24" font-size="10">single detector</text>
    <text x="510" y="135" text-anchor="middle" fill="#fbbf24" font-size="10">tail cone zone</text>

    <rect x="630" y="80" width="270" height="60" rx="8" fill="url(#boxFill)" stroke="#a78bfa" stroke-width="1.5"/>
    <text x="765" y="103" text-anchor="middle" fill="#a78bfa" font-size="13" font-weight="700">SMOKE DETECTORS · 4 total</text>
    <text x="765" y="121" text-anchor="middle" fill="#c4b5fd" font-size="10">2 aft baggage · 1 fwd baggage</text>
    <text x="765" y="135" text-anchor="middle" fill="#c4b5fd" font-size="10">1 lavatory (cabin only)</text>
  </g>

  <!-- Detection lines into Control Amplifier -->
  <g stroke="#fbbf24" stroke-width="1.5" fill="none" marker-end="url(#arrowDet)" stroke-dasharray="3 2">
    <path d="M 110 140 L 540 200"/>
    <path d="M 310 140 L 580 200"/>
    <path d="M 510 140 L 600 200"/>
    <path d="M 765 140 L 660 200"/>
  </g>

  <!-- Control Amplifier -->
  <g>
    <rect x="500" y="180" width="220" height="80" rx="10" fill="#142339" stroke="#22c55e" stroke-width="2.2"/>
    <text x="610" y="205" text-anchor="middle" fill="#86efac" font-family="Inter, system-ui, sans-serif" font-size="15" font-weight="700">CONTROL AMPLIFIER</text>
    <text x="610" y="225" text-anchor="middle" fill="#22c55e" font-family="Inter, system-ui, sans-serif" font-size="11">Detection · Extinguishing · BIT</text>
    <text x="610" y="243" text-anchor="middle" fill="#a3b3c6" font-family="Inter, system-ui, sans-serif" font-size="10">drives panel lights · CHECK FIRE DET · fire tone</text>
  </g>

  <!-- Fire Protection Panel -->
  <g>
    <rect x="850" y="180" width="320" height="80" rx="10" fill="#142339" stroke="#22c55e" stroke-width="2.2"/>
    <text x="1010" y="205" text-anchor="middle" fill="#86efac" font-family="Inter, system-ui, sans-serif" font-size="15" font-weight="700">FIRE PROTECTION PANEL</text>
    <text x="1010" y="225" text-anchor="middle" fill="#22c55e" font-family="Inter, system-ui, sans-serif" font-size="11">centre overhead · ENG 1/2 · APU · BAGGAGE</text>
    <text x="1010" y="243" text-anchor="middle" fill="#a3b3c6" font-family="Inter, system-ui, sans-serif" font-size="10">FAULT A/B · BTL LOW · EXTG · T-handles · TEST</text>
  </g>

  <!-- Amplifier to Panel -->
  <g stroke="#22c55e" stroke-width="1.5" fill="none" marker-end="url(#arrow)">
    <path d="M 720 220 L 850 220"/>
  </g>

  <!-- Bottle row label -->
  <text x="600" y="298" text-anchor="middle" fill="#dde6f1" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="700">Extinguishing Bottles</text>

  <!-- Engine bottles -->
  <g font-family="Inter, system-ui, sans-serif">
    <rect x="20" y="310" width="180" height="60" rx="8" fill="url(#boxFill)" stroke="#dc2626" stroke-width="1.8"/>
    <text x="110" y="333" text-anchor="middle" fill="#fca5a5" font-size="13" font-weight="700">FWD ENG BOTTLE</text>
    <text x="110" y="351" text-anchor="middle" fill="#fbbf24" font-size="10">left wing root · dual-port</text>
    <text x="110" y="365" text-anchor="middle" fill="#fbbf24" font-size="10">first shot</text>

    <rect x="220" y="310" width="180" height="60" rx="8" fill="url(#boxFill)" stroke="#dc2626" stroke-width="1.8"/>
    <text x="310" y="333" text-anchor="middle" fill="#fca5a5" font-size="13" font-weight="700">AFT ENG BOTTLE</text>
    <text x="310" y="351" text-anchor="middle" fill="#fbbf24" font-size="10">left wing root · dual-port</text>
    <text x="310" y="365" text-anchor="middle" fill="#fbbf24" font-size="10">second shot</text>

    <!-- Baggage HRD bottles -->
    <rect x="420" y="310" width="180" height="60" rx="8" fill="url(#boxFill)" stroke="#dc2626" stroke-width="1.5"/>
    <text x="510" y="333" text-anchor="middle" fill="#fca5a5" font-size="13" font-weight="700">FWD BAGGAGE HRD</text>
    <text x="510" y="351" text-anchor="middle" fill="#fbbf24" font-size="10">High-Rate Discharge</text>
    <text x="510" y="365" text-anchor="middle" fill="#fbbf24" font-size="10">FWD-BOTH-NOW</text>

    <rect x="640" y="310" width="180" height="60" rx="8" fill="url(#boxFill)" stroke="#dc2626" stroke-width="1.5"/>
    <text x="730" y="333" text-anchor="middle" fill="#fca5a5" font-size="13" font-weight="700">AFT BAGGAGE HRD</text>
    <text x="730" y="351" text-anchor="middle" fill="#fbbf24" font-size="10">High-Rate Discharge</text>
    <text x="730" y="365" text-anchor="middle" fill="#fbbf24" font-size="10">HRD now · LRD 7-min</text>

    <!-- Shared LRD -->
    <rect x="860" y="310" width="200" height="60" rx="8" fill="url(#boxFill)" stroke="#dc2626" stroke-width="1.5"/>
    <text x="960" y="333" text-anchor="middle" fill="#fca5a5" font-size="13" font-weight="700">SHARED LRD</text>
    <text x="960" y="351" text-anchor="middle" fill="#fbbf24" font-size="10">aft equipment bay</text>
    <text x="960" y="365" text-anchor="middle" fill="#fbbf24" font-size="10">slow soak both holds</text>
  </g>

  <!-- Engine bottle to engines plumbing -->
  <g stroke="#dc2626" stroke-width="1.5" fill="none" marker-end="url(#arrowFire)" stroke-dasharray="4 2">
    <path d="M 110 310 L 110 200"/>
    <path d="M 310 310 L 310 200"/>
    <path d="M 200 340 L 220 340"/>
  </g>

  <!-- Lavatory + T-handle + Portables row -->
  <g font-family="Inter, system-ui, sans-serif">
    <rect x="60" y="420" width="220" height="60" rx="8" fill="url(#boxFill)" stroke="#dc2626" stroke-width="1.5"/>
    <text x="170" y="443" text-anchor="middle" fill="#fca5a5" font-size="13" font-weight="700">LAVATORY POTTY BOTTLE</text>
    <text x="170" y="461" text-anchor="middle" fill="#fbbf24" font-size="10">thermal fuse · no wires</text>
    <text x="170" y="475" text-anchor="middle" fill="#fbbf24" font-size="10">cabin-only smoke alert</text>

    <rect x="380" y="420" width="220" height="60" rx="8" fill="url(#boxFill)" stroke="#22d3ee" stroke-width="1.8"/>
    <text x="490" y="443" text-anchor="middle" fill="#22d3ee" font-size="13" font-weight="700">PULL FUEL/HYD T-HANDLE</text>
    <text x="490" y="461" text-anchor="middle" fill="#7dd3fc" font-size="10">closes valves · arms squibs</text>
    <text x="490" y="475" text-anchor="middle" fill="#7dd3fc" font-size="10">EXTG switch fires bottle</text>

    <rect x="700" y="420" width="260" height="60" rx="8" fill="url(#boxFill)" stroke="#7dd3fc" stroke-width="1.5"/>
    <text x="830" y="443" text-anchor="middle" fill="#7dd3fc" font-size="13" font-weight="700">HALON 1211 PORTABLES (4)</text>
    <text x="830" y="461" text-anchor="middle" fill="#a3b3c6" font-size="10">1 cockpit · 3 cabin</text>
    <text x="830" y="475" text-anchor="middle" fill="#a3b3c6" font-size="10">cockpit use needs 100% O2 mask</text>
  </g>

  <!-- Bottom callouts -->
  <g font-family="Inter, system-ui, sans-serif">
    <rect x="40" y="500" width="540" height="80" rx="8" fill="#0a1322" stroke="#3a4a66" stroke-width="1"/>
    <text x="60" y="520" fill="#dde6f1" font-size="11" font-weight="700">ENGINE FIRE CHANT</text>
    <text x="60" y="540" fill="#a3b3c6" font-size="11">FLASH · PRESS · PULL · EXTG · 30-sec · OTHER</text>
    <text x="60" y="558" fill="#a3b3c6" font-size="11">Two shots per engine. Wait 30 sec between bottles.</text>
    <text x="60" y="575" fill="#fcd34d" font-size="11">Mnemonic: 2-BOTTLES-LEFT-WING · 7-APDs · 3-PER-NACELLE</text>

    <rect x="600" y="500" width="560" height="80" rx="8" fill="#0a1322" stroke="#3a4a66" stroke-width="1"/>
    <text x="620" y="520" fill="#dde6f1" font-size="11" font-weight="700">BAGGAGE AND LAVATORY LOGIC</text>
    <text x="620" y="540" fill="#a3b3c6" font-size="11">AFT: HRD now · LRD auto 7 min later · vents close auto</text>
    <text x="620" y="558" fill="#a3b3c6" font-size="11">FWD: HRD and LRD simultaneously · LAVATORY: thermal fuse, cabin-only</text>
    <text x="620" y="575" fill="#fcd34d" font-size="11">Mnemonic: HRD-AFT-7-LRD · FWD-BOTH-NOW · POTTY-FUSE · LAV-CABIN-ONLY</text>
  </g>

  <!-- HOTSPOTS -->
  <g font-family="Inter, system-ui, sans-serif" font-weight="700">
    <g class="hotspot" data-id="h1"><circle cx="100" cy="100" r="11" fill="#fbbf24" stroke="#0e1b2c" stroke-width="1.5"/><text x="100" y="104" font-size="11" fill="#0e1b2c" text-anchor="middle">1</text></g>
    <g class="hotspot" data-id="h2"><circle cx="300" cy="100" r="11" fill="#fbbf24" stroke="#0e1b2c" stroke-width="1.5"/><text x="300" y="104" font-size="11" fill="#0e1b2c" text-anchor="middle">2</text></g>
    <g class="hotspot" data-id="h3"><circle cx="500" cy="100" r="11" fill="#fbbf24" stroke="#0e1b2c" stroke-width="1.5"/><text x="500" y="104" font-size="11" fill="#0e1b2c" text-anchor="middle">3</text></g>
    <g class="hotspot" data-id="h4"><circle cx="730" cy="100" r="11" fill="#a78bfa" stroke="#0e1b2c" stroke-width="1.5"/><text x="730" y="104" font-size="11" fill="#fff" text-anchor="middle">4</text></g>
    <g class="hotspot" data-id="h5"><circle cx="600" cy="210" r="12" fill="#22c55e" stroke="#0e1b2c" stroke-width="1.5"/><text x="600" y="214" font-size="11" fill="#0e1b2c" text-anchor="middle">5</text></g>
    <g class="hotspot" data-id="h6"><circle cx="960" cy="210" r="12" fill="#22c55e" stroke="#0e1b2c" stroke-width="1.5"/><text x="960" y="214" font-size="11" fill="#0e1b2c" text-anchor="middle">6</text></g>
    <g class="hotspot" data-id="h7"><circle cx="100" cy="340" r="11" fill="#dc2626" stroke="#0e1b2c" stroke-width="1.5"/><text x="100" y="344" font-size="11" fill="#fff" text-anchor="middle">7</text></g>
    <g class="hotspot" data-id="h8"><circle cx="300" cy="340" r="11" fill="#dc2626" stroke="#0e1b2c" stroke-width="1.5"/><text x="300" y="344" font-size="11" fill="#fff" text-anchor="middle">8</text></g>
    <g class="hotspot" data-id="h9"><circle cx="500" cy="340" r="11" fill="#dc2626" stroke="#0e1b2c" stroke-width="1.5"/><text x="500" y="344" font-size="11" fill="#fff" text-anchor="middle">9</text></g>
    <g class="hotspot" data-id="h10"><circle cx="730" cy="340" r="11" fill="#dc2626" stroke="#0e1b2c" stroke-width="1.5"/><text x="730" y="344" font-size="11" fill="#fff" text-anchor="middle">10</text></g>
    <g class="hotspot" data-id="h11"><circle cx="960" cy="340" r="11" fill="#dc2626" stroke="#0e1b2c" stroke-width="1.5"/><text x="960" y="344" font-size="11" fill="#fff" text-anchor="middle">11</text></g>
    <g class="hotspot" data-id="h12"><circle cx="170" cy="460" r="11" fill="#dc2626" stroke="#0e1b2c" stroke-width="1.5"/><text x="170" y="464" font-size="11" fill="#fff" text-anchor="middle">12</text></g>
    <g class="hotspot" data-id="h13"><circle cx="500" cy="460" r="11" fill="#22d3ee" stroke="#0e1b2c" stroke-width="1.5"/><text x="500" y="464" font-size="11" fill="#0e1b2c" text-anchor="middle">13</text></g>
    <g class="hotspot" data-id="h14"><circle cx="880" cy="460" r="11" fill="#7dd3fc" stroke="#0e1b2c" stroke-width="1.5"/><text x="880" y="464" font-size="11" fill="#0e1b2c" text-anchor="middle">14</text></g>
  </g>
</svg>
