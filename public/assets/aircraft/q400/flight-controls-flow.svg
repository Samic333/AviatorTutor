<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 600" role="img" aria-label="Q400 flight controls architecture: ailerons mechanical, spoilers and elevators and rudder hydraulic, FCECU brain, PFTU, flaps, roll and pitch disconnect handles, control lock, yaw damper, stall protection system">
  <title>Q400 Flight Controls Architecture</title>
  <desc>Schematic of the Q400 flight controls system. Ailerons are mechanical with cable drive. Spoilers, elevators, and rudder are hydraulically powered (PFCS). Each elevator has 3 PCUs across hydraulic systems 1, 2, and 3 standby. Rudder has 2 PCUs. The FCECU is the brain regulating rudder authority, pitch feel, and pitch trim. Roll disconnect and pitch disconnect handles split jammed surfaces. CONTROL LOCK provides aileron gust protection. Yaw damper has 4.5 degree authority. Stall Protection System has 2 SPMs driving stick shakers and pusher.</desc>

  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#0e1b2c"/><stop offset="1" stop-color="#0a1322"/></linearGradient>
    <linearGradient id="boxFill" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#1c2a40"/><stop offset="1" stop-color="#0e1b2c"/></linearGradient>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M 0 0 L 10 5 L 0 10 Z" fill="#7dd3fc"/></marker>
    <marker id="arrowMech" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M 0 0 L 10 5 L 0 10 Z" fill="#22d3ee"/></marker>
    <marker id="arrowHyd" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M 0 0 L 10 5 L 0 10 Z" fill="#a78bfa"/></marker>
  </defs>

  <rect width="1200" height="600" fill="url(#bg)"/>

  <text x="600" y="34" text-anchor="middle" fill="#dde6f1" font-family="Inter, system-ui, sans-serif" font-size="20" font-weight="700">Q400 Flight Controls Architecture</text>
  <text x="600" y="56" text-anchor="middle" fill="#7a8aa6" font-family="Inter, system-ui, sans-serif" font-size="12">Ailerons mechanical · spoilers/elevators/rudder hydraulic · FCECU brain · 3 PCUs per elevator · 2 PCUs rudder · SPS layer</text>

  <!-- Surface row -->
  <g font-family="Inter, system-ui, sans-serif">
    <rect x="20" y="80" width="180" height="60" rx="8" fill="url(#boxFill)" stroke="#22d3ee" stroke-width="1.8"/>
    <text x="110" y="103" text-anchor="middle" fill="#22d3ee" font-size="13" font-weight="700">L AILERON</text>
    <text x="110" y="121" text-anchor="middle" fill="#7dd3fc" font-size="10">mechanical · cable</text>
    <text x="110" y="135" text-anchor="middle" fill="#7dd3fc" font-size="10">±17° · geared tab</text>

    <rect x="220" y="80" width="180" height="60" rx="8" fill="url(#boxFill)" stroke="#22d3ee" stroke-width="1.8"/>
    <text x="310" y="103" text-anchor="middle" fill="#22d3ee" font-size="13" font-weight="700">R AILERON</text>
    <text x="310" y="121" text-anchor="middle" fill="#7dd3fc" font-size="10">mechanical · cable</text>
    <text x="310" y="135" text-anchor="middle" fill="#7dd3fc" font-size="10">geared tab + trim tab</text>

    <rect x="420" y="80" width="200" height="60" rx="8" fill="url(#boxFill)" stroke="#fbbf24" stroke-width="1.8"/>
    <text x="520" y="103" text-anchor="middle" fill="#fcd34d" font-size="13" font-weight="700">INBOARD SPOILERS</text>
    <text x="520" y="121" text-anchor="middle" fill="#fbbf24" font-size="10">No.1 hyd · 2 panels</text>
    <text x="520" y="135" text-anchor="middle" fill="#fbbf24" font-size="10">always active</text>

    <rect x="640" y="80" width="220" height="60" rx="8" fill="url(#boxFill)" stroke="#fbbf24" stroke-width="1.8"/>
    <text x="750" y="103" text-anchor="middle" fill="#fcd34d" font-size="13" font-weight="700">OUTBOARD SPOILERS</text>
    <text x="750" y="121" text-anchor="middle" fill="#fbbf24" font-size="10">No.2 hyd · 2 panels</text>
    <text x="750" y="135" text-anchor="middle" fill="#fbbf24" font-size="10">170-OFF / 165-ON</text>

    <rect x="880" y="80" width="290" height="60" rx="8" fill="url(#boxFill)" stroke="#a78bfa" stroke-width="1.8"/>
    <text x="1025" y="103" text-anchor="middle" fill="#a78bfa" font-size="13" font-weight="700">ELEVATORS · 3 PCUs each</text>
    <text x="1025" y="121" text-anchor="middle" fill="#c4b5fd" font-size="10">outbd N1 · ctr N2 · inbd N3 standby</text>
    <text x="1025" y="135" text-anchor="middle" fill="#c4b5fd" font-size="10">PFTU artificial feel</text>
  </g>

  <!-- Rudder + FCECU + PFTU -->
  <g font-family="Inter, system-ui, sans-serif">
    <rect x="20" y="190" width="180" height="60" rx="8" fill="url(#boxFill)" stroke="#a78bfa" stroke-width="1.8"/>
    <text x="110" y="213" text-anchor="middle" fill="#a78bfa" font-size="13" font-weight="700">RUDDER · 2 PCUs</text>
    <text x="110" y="231" text-anchor="middle" fill="#c4b5fd" font-size="10">RUD 1 lower · RUD 2 upper</text>
    <text x="110" y="245" text-anchor="middle" fill="#c4b5fd" font-size="10">AFM 4.18.12 — one at a time</text>

    <rect x="500" y="190" width="200" height="60" rx="10" fill="#142339" stroke="#22c55e" stroke-width="2.2"/>
    <text x="600" y="213" text-anchor="middle" fill="#86efac" font-size="15" font-weight="700">FCECU</text>
    <text x="600" y="231" text-anchor="middle" fill="#22c55e" font-size="10">Flight Control Electronic Control Unit</text>
    <text x="600" y="245" text-anchor="middle" fill="#a3b3c6" font-size="10">authority · feel · trim · IAS mismatch</text>

    <rect x="900" y="190" width="270" height="60" rx="8" fill="url(#boxFill)" stroke="#a78bfa" stroke-width="1.8"/>
    <text x="1035" y="213" text-anchor="middle" fill="#a78bfa" font-size="13" font-weight="700">PFTU + PITCH TRIM ACTUATORS</text>
    <text x="1035" y="231" text-anchor="middle" fill="#c4b5fd" font-size="10">artificial feel · scaled by airspeed</text>
    <text x="1035" y="245" text-anchor="middle" fill="#c4b5fd" font-size="10">3-sec rule trip</text>
  </g>

  <!-- FCECU connection lines -->
  <g stroke="#22c55e" stroke-width="1.5" fill="none" marker-end="url(#arrow)" stroke-dasharray="3 2">
    <path d="M 600 190 L 520 140"/>
    <path d="M 600 190 L 750 140"/>
    <path d="M 600 190 L 1025 140"/>
    <path d="M 500 220 L 200 220"/>
    <path d="M 700 220 L 900 220"/>
  </g>

  <!-- Disconnect + lock + flaps row -->
  <g font-family="Inter, system-ui, sans-serif">
    <rect x="40" y="290" width="220" height="60" rx="8" fill="url(#boxFill)" stroke="#7dd3fc" stroke-width="1.8"/>
    <text x="150" y="313" text-anchor="middle" fill="#7dd3fc" font-size="13" font-weight="700">FLAPS · 5 GATES</text>
    <text x="150" y="331" text-anchor="middle" fill="#a3b3c6" font-size="10">0 · 5 · 10 · 15 · 35</text>
    <text x="150" y="345" text-anchor="middle" fill="#a3b3c6" font-size="10">No.1 hyd · FCU · FPU · 4 act/wing</text>

    <rect x="320" y="290" width="180" height="60" rx="8" fill="url(#boxFill)" stroke="#dc2626" stroke-width="1.8"/>
    <text x="410" y="313" text-anchor="middle" fill="#fca5a5" font-size="13" font-weight="700">ROLL DISC</text>
    <text x="410" y="331" text-anchor="middle" fill="#fbbf24" font-size="10">pull out + 90°</text>
    <text x="410" y="345" text-anchor="middle" fill="#fbbf24" font-size="10">pilot=spoilers / cop=ailerons</text>

    <rect x="520" y="290" width="180" height="60" rx="8" fill="url(#boxFill)" stroke="#dc2626" stroke-width="1.8"/>
    <text x="610" y="313" text-anchor="middle" fill="#fca5a5" font-size="13" font-weight="700">PITCH DISC</text>
    <text x="610" y="331" text-anchor="middle" fill="#fbbf24" font-size="10">pull out + 90°</text>
    <text x="610" y="345" text-anchor="middle" fill="#fbbf24" font-size="10">free column flies</text>

    <rect x="720" y="290" width="180" height="60" rx="8" fill="url(#boxFill)" stroke="#22d3ee" stroke-width="1.8"/>
    <text x="810" y="313" text-anchor="middle" fill="#22d3ee" font-size="13" font-weight="700">CONTROL LOCK</text>
    <text x="810" y="331" text-anchor="middle" fill="#7dd3fc" font-size="10">FWD = OFF · AFT = ON</text>
    <text x="810" y="345" text-anchor="middle" fill="#7dd3fc" font-size="10">restricts power lever travel</text>

    <rect x="920" y="290" width="180" height="60" rx="8" fill="url(#boxFill)" stroke="#a78bfa" stroke-width="1.8"/>
    <text x="1010" y="313" text-anchor="middle" fill="#a78bfa" font-size="13" font-weight="700">YAW DAMPER</text>
    <text x="1010" y="331" text-anchor="middle" fill="#c4b5fd" font-size="10">±4.5° max</text>
    <text x="1010" y="345" text-anchor="middle" fill="#c4b5fd" font-size="10">needs FGM 1 AND 2</text>
  </g>

  <!-- SPS row -->
  <g font-family="Inter, system-ui, sans-serif">
    <rect x="380" y="400" width="440" height="80" rx="10" fill="#142339" stroke="#fbbf24" stroke-width="2"/>
    <text x="600" y="425" text-anchor="middle" fill="#fcd34d" font-size="15" font-weight="700">STALL PROTECTION SYSTEM (SPS)</text>
    <text x="600" y="445" text-anchor="middle" fill="#fbbf24" font-size="11">2 SPMs · stick shakers · stick pusher (avg AOA1+AOA2)</text>
    <text x="600" y="463" text-anchor="middle" fill="#a3b3c6" font-size="10">inputs: AoA · flap · Mach · torque · icing</text>
    <text x="600" y="477" text-anchor="middle" fill="#a3b3c6" font-size="10">daily test: TEST1 then TEST2 each held &gt;10 sec</text>
  </g>

  <!-- Bottom callouts -->
  <g font-family="Inter, system-ui, sans-serif">
    <rect x="40" y="500" width="540" height="80" rx="8" fill="#0a1322" stroke="#3a4a66" stroke-width="1"/>
    <text x="60" y="520" fill="#dde6f1" font-size="11" font-weight="700">SPOILER GROUND MODE — 3 CONDITIONS</text>
    <text x="60" y="538" fill="#a3b3c6" font-size="11">FLIGHT/TAXI in FLIGHT · power levers below FLT IDLE +12° · WOW both gear</text>
    <text x="60" y="556" fill="#a3b3c6" font-size="11">Lift-dump valve fault: ROLL SPLR INBD/OUTBD GND after 5-sec delay</text>
    <text x="60" y="573" fill="#fcd34d" font-size="11">Mnemonic: 3-COND-LIFT-DUMP · 170-OFF-165-ON · IN-N1-OUT-N2</text>

    <rect x="600" y="500" width="560" height="80" rx="8" fill="#0a1322" stroke="#3a4a66" stroke-width="1"/>
    <text x="620" y="520" fill="#dde6f1" font-size="11" font-weight="700">IAS MISMATCH CASCADE — 4 LIGHTS TOGETHER</text>
    <text x="620" y="538" fill="#a3b3c6" font-size="11">Airspeed #1 vs #2 differ &gt;17 kts → 4 cautions illuminate together:</text>
    <text x="620" y="556" fill="#a3b3c6" font-size="11">RUD CTRL · SPLR OUTBD · ELEV FEEL · PITCH TRIM. REDUCE BELOW 200 KIAS</text>
    <text x="620" y="573" fill="#fcd34d" font-size="11">Mnemonic: 17-KTS-MISMATCH · 4-LIGHTS · IDENTIFY BAD ADU · QRH</text>
  </g>

  <!-- HOTSPOTS -->
  <g font-family="Inter, system-ui, sans-serif" font-weight="700">
    <g class="hotspot" data-id="h1"><circle cx="100" cy="100" r="11" fill="#22d3ee" stroke="#0e1b2c" stroke-width="1.5"/><text x="100" y="104" font-size="11" fill="#0e1b2c" text-anchor="middle">1</text></g>
    <g class="hotspot" data-id="h2"><circle cx="300" cy="100" r="11" fill="#22d3ee" stroke="#0e1b2c" stroke-width="1.5"/><text x="300" y="104" font-size="11" fill="#0e1b2c" text-anchor="middle">2</text></g>
    <g class="hotspot" data-id="h3"><circle cx="500" cy="100" r="11" fill="#fbbf24" stroke="#0e1b2c" stroke-width="1.5"/><text x="500" y="104" font-size="11" fill="#0e1b2c" text-anchor="middle">3</text></g>
    <g class="hotspot" data-id="h4"><circle cx="730" cy="100" r="11" fill="#fbbf24" stroke="#0e1b2c" stroke-width="1.5"/><text x="730" y="104" font-size="11" fill="#0e1b2c" text-anchor="middle">4</text></g>
    <g class="hotspot" data-id="h5"><circle cx="960" cy="100" r="11" fill="#a78bfa" stroke="#0e1b2c" stroke-width="1.5"/><text x="960" y="104" font-size="11" fill="#fff" text-anchor="middle">5</text></g>
    <g class="hotspot" data-id="h6"><circle cx="100" cy="240" r="11" fill="#a78bfa" stroke="#0e1b2c" stroke-width="1.5"/><text x="100" y="244" font-size="11" fill="#fff" text-anchor="middle">6</text></g>
    <g class="hotspot" data-id="h7"><circle cx="600" cy="240" r="12" fill="#22c55e" stroke="#0e1b2c" stroke-width="1.5"/><text x="600" y="244" font-size="11" fill="#0e1b2c" text-anchor="middle">7</text></g>
    <g class="hotspot" data-id="h8"><circle cx="960" cy="240" r="11" fill="#a78bfa" stroke="#0e1b2c" stroke-width="1.5"/><text x="960" y="244" font-size="11" fill="#fff" text-anchor="middle">8</text></g>
    <g class="hotspot" data-id="h9"><circle cx="170" cy="360" r="11" fill="#7dd3fc" stroke="#0e1b2c" stroke-width="1.5"/><text x="170" y="364" font-size="11" fill="#0e1b2c" text-anchor="middle">9</text></g>
    <g class="hotspot" data-id="h10"><circle cx="430" cy="360" r="11" fill="#dc2626" stroke="#0e1b2c" stroke-width="1.5"/><text x="430" y="364" font-size="11" fill="#fff" text-anchor="middle">10</text></g>
    <g class="hotspot" data-id="h11"><circle cx="600" cy="360" r="11" fill="#dc2626" stroke="#0e1b2c" stroke-width="1.5"/><text x="600" y="364" font-size="11" fill="#fff" text-anchor="middle">11</text></g>
    <g class="hotspot" data-id="h12"><circle cx="770" cy="360" r="11" fill="#22d3ee" stroke="#0e1b2c" stroke-width="1.5"/><text x="770" y="364" font-size="11" fill="#0e1b2c" text-anchor="middle">12</text></g>
    <g class="hotspot" data-id="h13"><circle cx="950" cy="360" r="11" fill="#a78bfa" stroke="#0e1b2c" stroke-width="1.5"/><text x="950" y="364" font-size="11" fill="#fff" text-anchor="middle">13</text></g>
    <g class="hotspot" data-id="h14"><circle cx="600" cy="480" r="12" fill="#fbbf24" stroke="#0e1b2c" stroke-width="1.5"/><text x="600" y="484" font-size="11" fill="#0e1b2c" text-anchor="middle">14</text></g>
  </g>
</svg>
