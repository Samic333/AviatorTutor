<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 600" role="img" aria-label="Q400 fuel system architecture: two integral wing tanks with surge main collector bays, aux pumps, central transfer plumbing with no engine crossfeed, FOHE, pressure and gravity refuel, MFD fuel page, FQC imbalance logic">
  <title>Q400 Fuel Architecture</title>
  <desc>Schematic of the Q400 fuel system. Two integral wing tanks each divided into surge bay, main tank, and collector bay. Each collector houses scavenge ejectors, primary ejector pump, and AC variable-frequency aux pump. NO engine crossfeed exists. Tank-to-tank fuel transfer through central plumbing using the FUEL TRANSFER switch. Engine feed routes through the Fuel Oil Heat Exchanger that filters and heats fuel before the FMU. Pressure refuel access on rear underside of No.2 nacelle requires DC power; gravity overwing adapters as backup. FQC monitors lateral imbalance and triggers BALANCE message above 272 kg.</desc>

  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#0e1b2c"/><stop offset="1" stop-color="#0a1322"/></linearGradient>
    <linearGradient id="boxFill" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#1c2a40"/><stop offset="1" stop-color="#0e1b2c"/></linearGradient>
    <linearGradient id="tankFill" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#0d4f3c"/><stop offset="1" stop-color="#0a3328"/></linearGradient>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M 0 0 L 10 5 L 0 10 Z" fill="#7dd3fc"/></marker>
    <marker id="arrowFuel" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M 0 0 L 10 5 L 0 10 Z" fill="#10b981"/></marker>
    <marker id="arrowXfer" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M 0 0 L 10 5 L 0 10 Z" fill="#22c55e"/></marker>
  </defs>

  <rect width="1200" height="600" fill="url(#bg)"/>

  <text x="600" y="34" text-anchor="middle" fill="#dde6f1" font-family="Inter, system-ui, sans-serif" font-size="20" font-weight="700">Q400 Fuel Architecture</text>
  <text x="600" y="56" text-anchor="middle" fill="#7a8aa6" font-family="Inter, system-ui, sans-serif" font-size="12">2 wing tanks · 3 bays each · NO crossfeed · 5318 kg usable · 272 kg imbalance · 150 kg FUEL LOW</text>

  <!-- Tank No.1 (left wing) -->
  <g font-family="Inter, system-ui, sans-serif">
    <rect x="20" y="80" width="540" height="60" rx="8" fill="url(#tankFill)" stroke="#10b981" stroke-width="1.8"/>
    <text x="290" y="103" text-anchor="middle" fill="#34d399" font-size="13" font-weight="700">TANK No.1 — LEFT WING — feeds left engine + APU</text>
    <text x="290" y="121" text-anchor="middle" fill="#86efac" font-size="10">SURGE bay (vent + recovery)  ·  MAIN tank (storage)  ·  COLLECTOR bay (engine feed)</text>
    <text x="290" y="135" text-anchor="middle" fill="#86efac" font-size="10">scavenge ejectors · primary ejector · AC VF aux pump · FUEL LOW at ~150 kg in collector</text>
  </g>

  <!-- Tank No.2 (right wing) -->
  <g font-family="Inter, system-ui, sans-serif">
    <rect x="640" y="80" width="540" height="60" rx="8" fill="url(#tankFill)" stroke="#10b981" stroke-width="1.8"/>
    <text x="910" y="103" text-anchor="middle" fill="#34d399" font-size="13" font-weight="700">TANK No.2 — RIGHT WING — feeds right engine</text>
    <text x="910" y="121" text-anchor="middle" fill="#86efac" font-size="10">SURGE bay (vent + recovery)  ·  MAIN tank (storage)  ·  COLLECTOR bay (engine feed)</text>
    <text x="910" y="135" text-anchor="middle" fill="#86efac" font-size="10">mirror of TANK No.1 — same architecture, no crossfeed plumbing</text>
  </g>

  <!-- Aux pump row -->
  <g font-family="Inter, system-ui, sans-serif">
    <rect x="40" y="200" width="200" height="60" rx="8" fill="url(#boxFill)" stroke="#fbbf24" stroke-width="1.8"/>
    <text x="140" y="223" text-anchor="middle" fill="#fcd34d" font-size="13" font-weight="700">TANK 1 AUX PUMP</text>
    <text x="140" y="241" text-anchor="middle" fill="#fbbf24" font-size="10">AC variable freq · in collector</text>
    <text x="140" y="255" text-anchor="middle" fill="#fbbf24" font-size="10">ON for T/O LDG · auto on transfer</text>

    <rect x="450" y="180" width="300" height="80" rx="10" fill="#142339" stroke="#22c55e" stroke-width="2.2"/>
    <text x="600" y="205" text-anchor="middle" fill="#86efac" font-size="15" font-weight="700">FUEL TRANSFER PLUMBING</text>
    <text x="600" y="225" text-anchor="middle" fill="#22c55e" font-size="11">TO TANK 1 · CENTER · TO TANK 2</text>
    <text x="600" y="243" text-anchor="middle" fill="#a3b3c6" font-size="10">donor aux auto-on · auto-stop on overfill</text>
    <text x="600" y="255" text-anchor="middle" fill="#fcd34d" font-size="10">FUELING ON inhibits transfer</text>

    <rect x="960" y="200" width="200" height="60" rx="8" fill="url(#boxFill)" stroke="#fbbf24" stroke-width="1.8"/>
    <text x="1060" y="223" text-anchor="middle" fill="#fcd34d" font-size="13" font-weight="700">TANK 2 AUX PUMP</text>
    <text x="1060" y="241" text-anchor="middle" fill="#fbbf24" font-size="10">AC variable freq · in collector</text>
    <text x="1060" y="255" text-anchor="middle" fill="#fbbf24" font-size="10">ON for T/O LDG · auto on transfer</text>
  </g>

  <!-- Tank to aux to transfer connections -->
  <g stroke="#10b981" stroke-width="1.5" fill="none" marker-end="url(#arrowFuel)" stroke-dasharray="3 2">
    <path d="M 290 140 L 140 200"/>
    <path d="M 910 140 L 1060 200"/>
  </g>
  <g stroke="#22c55e" stroke-width="2" fill="none" marker-end="url(#arrowXfer)">
    <path d="M 240 230 L 450 220"/>
    <path d="M 750 220 L 960 230"/>
  </g>

  <!-- Engine feed + refuel row -->
  <g font-family="Inter, system-ui, sans-serif">
    <rect x="40" y="290" width="200" height="60" rx="8" fill="url(#boxFill)" stroke="#a78bfa" stroke-width="1.8"/>
    <text x="140" y="313" text-anchor="middle" fill="#a78bfa" font-size="13" font-weight="700">FOHE</text>
    <text x="140" y="331" text-anchor="middle" fill="#c4b5fd" font-size="10">Fuel Oil Heat Exchanger</text>
    <text x="140" y="345" text-anchor="middle" fill="#c4b5fd" font-size="10">filters AND heats · FLTR BYPASS</text>

    <rect x="270" y="290" width="180" height="60" rx="8" fill="url(#boxFill)" stroke="#dc2626" stroke-width="1.8"/>
    <text x="360" y="313" text-anchor="middle" fill="#fca5a5" font-size="13" font-weight="700">ENGINE SHUTOFF</text>
    <text x="360" y="331" text-anchor="middle" fill="#fbbf24" font-size="10">PULL FUEL/HYD T-handle</text>
    <text x="360" y="345" text-anchor="middle" fill="#fbbf24" font-size="10">closes fuel + hyd valves</text>

    <rect x="480" y="290" width="240" height="60" rx="8" fill="url(#boxFill)" stroke="#22d3ee" stroke-width="1.8"/>
    <text x="600" y="313" text-anchor="middle" fill="#22d3ee" font-size="13" font-weight="700">FUEL CONTROL TRANSFER PANEL</text>
    <text x="600" y="331" text-anchor="middle" fill="#7dd3fc" font-size="10">AUX 1 · TRANSFER · AUX 2 switches</text>
    <text x="600" y="345" text-anchor="middle" fill="#7dd3fc" font-size="10">crew interface</text>

    <rect x="750" y="290" width="200" height="60" rx="8" fill="url(#boxFill)" stroke="#7dd3fc" stroke-width="1.5"/>
    <text x="850" y="313" text-anchor="middle" fill="#7dd3fc" font-size="13" font-weight="700">GRAVITY REFUEL</text>
    <text x="850" y="331" text-anchor="middle" fill="#a3b3c6" font-size="10">overwing adapters</text>
    <text x="850" y="345" text-anchor="middle" fill="#a3b3c6" font-size="10">no DC required · slow flow</text>

    <rect x="980" y="290" width="180" height="60" rx="8" fill="url(#boxFill)" stroke="#fbbf24" stroke-width="1.8"/>
    <text x="1070" y="313" text-anchor="middle" fill="#fcd34d" font-size="13" font-weight="700">PRESSURE REFUEL</text>
    <text x="1070" y="331" text-anchor="middle" fill="#fbbf24" font-size="10">No.2 nacelle access</text>
    <text x="1070" y="345" text-anchor="middle" fill="#fbbf24" font-size="10">DC POWER REQUIRED</text>
  </g>

  <!-- MFD + FQC + indications row -->
  <g font-family="Inter, system-ui, sans-serif">
    <rect x="40" y="400" width="320" height="80" rx="10" fill="#142339" stroke="#22c55e" stroke-width="2.2"/>
    <text x="200" y="425" text-anchor="middle" fill="#86efac" font-size="15" font-weight="700">MFD FUEL PAGE</text>
    <text x="200" y="445" text-anchor="middle" fill="#22c55e" font-size="11">analog dials · digital · temp · AUX · valve</text>
    <text x="200" y="463" text-anchor="middle" fill="#a3b3c6" font-size="10">white pointer normal · YELLOW imbalance</text>
    <text x="200" y="477" text-anchor="middle" fill="#a3b3c6" font-size="10">aux pressure circle: green normal · white low</text>

    <rect x="600" y="400" width="320" height="80" rx="10" fill="#142339" stroke="#dc2626" stroke-width="2.2"/>
    <text x="760" y="425" text-anchor="middle" fill="#fca5a5" font-size="15" font-weight="700">FQC + BALANCE LOGIC</text>
    <text x="760" y="445" text-anchor="middle" fill="#dc2626" font-size="11">Fuel Quantity Computer · monitors imbalance</text>
    <text x="760" y="463" text-anchor="middle" fill="#a3b3c6" font-size="10">imbalance &gt;272 kg → yellow [BALANCE] flashes</text>
    <text x="760" y="477" text-anchor="middle" fill="#a3b3c6" font-size="10">analog dials turn solid yellow</text>
  </g>

  <!-- Bottom callouts -->
  <g font-family="Inter, system-ui, sans-serif">
    <rect x="40" y="500" width="540" height="80" rx="8" fill="#0a1322" stroke="#3a4a66" stroke-width="1"/>
    <text x="60" y="520" fill="#dde6f1" font-size="11" font-weight="700">FUEL TRANSFER LOGIC</text>
    <text x="60" y="538" fill="#a3b3c6" font-size="11">Switch toward receiver tank · donor aux auto-on (green ON without push)</text>
    <text x="60" y="556" fill="#a3b3c6" font-size="11">Auto-stop on receiver high-level overfill · INHIBITED by FUELING ON caution</text>
    <text x="60" y="573" fill="#fcd34d" font-size="11">Mnemonics: NO-CROSSFEED-TANK-TO-TANK · AUTO-AUX-DURING-TRANSFER</text>

    <rect x="600" y="500" width="560" height="80" rx="8" fill="#0a1322" stroke="#3a4a66" stroke-width="1"/>
    <text x="620" y="520" fill="#dde6f1" font-size="11" font-weight="700">CRITICAL NUMBERS + LIMITS</text>
    <text x="620" y="538" fill="#a3b3c6" font-size="11">Total usable: 5,318 kg  ·  Imbalance limit: 272 kg  ·  FUEL LOW: ~150 kg collector</text>
    <text x="620" y="556" fill="#a3b3c6" font-size="11">JET B / JP-4 with TANK temp &gt;35°C → max altitude FL200</text>
    <text x="620" y="573" fill="#fcd34d" font-size="11">DC for refuel · FUEL LEAK: never transfer · 3 conditions for FUEL LOW</text>
  </g>

  <!-- HOTSPOTS -->
  <g font-family="Inter, system-ui, sans-serif" font-weight="700">
    <g class="hotspot" data-id="h1"><circle cx="170" cy="100" r="11" fill="#10b981" stroke="#0e1b2c" stroke-width="1.5"/><text x="170" y="104" font-size="11" fill="#0e1b2c" text-anchor="middle">1</text></g>
    <g class="hotspot" data-id="h2"><circle cx="730" cy="100" r="11" fill="#10b981" stroke="#0e1b2c" stroke-width="1.5"/><text x="730" y="104" font-size="11" fill="#0e1b2c" text-anchor="middle">2</text></g>
    <g class="hotspot" data-id="h3"><circle cx="360" cy="100" r="11" fill="#7dd3fc" stroke="#0e1b2c" stroke-width="1.5"/><text x="360" y="104" font-size="11" fill="#0e1b2c" text-anchor="middle">3</text></g>
    <g class="hotspot" data-id="h4"><circle cx="950" cy="100" r="11" fill="#7dd3fc" stroke="#0e1b2c" stroke-width="1.5"/><text x="950" y="104" font-size="11" fill="#0e1b2c" text-anchor="middle">4</text></g>
    <g class="hotspot" data-id="h5"><circle cx="170" cy="240" r="11" fill="#fbbf24" stroke="#0e1b2c" stroke-width="1.5"/><text x="170" y="244" font-size="11" fill="#0e1b2c" text-anchor="middle">5</text></g>
    <g class="hotspot" data-id="h6"><circle cx="730" cy="240" r="11" fill="#fbbf24" stroke="#0e1b2c" stroke-width="1.5"/><text x="730" y="244" font-size="11" fill="#0e1b2c" text-anchor="middle">6</text></g>
    <g class="hotspot" data-id="h7"><circle cx="500" cy="220" r="12" fill="#22c55e" stroke="#0e1b2c" stroke-width="1.5"/><text x="500" y="224" font-size="11" fill="#0e1b2c" text-anchor="middle">7</text></g>
    <g class="hotspot" data-id="h8"><circle cx="500" cy="360" r="11" fill="#22d3ee" stroke="#0e1b2c" stroke-width="1.5"/><text x="500" y="364" font-size="11" fill="#0e1b2c" text-anchor="middle">8</text></g>
    <g class="hotspot" data-id="h9"><circle cx="170" cy="360" r="11" fill="#a78bfa" stroke="#0e1b2c" stroke-width="1.5"/><text x="170" y="364" font-size="11" fill="#fff" text-anchor="middle">9</text></g>
    <g class="hotspot" data-id="h10"><circle cx="290" cy="360" r="11" fill="#dc2626" stroke="#0e1b2c" stroke-width="1.5"/><text x="290" y="364" font-size="11" fill="#fff" text-anchor="middle">10</text></g>
    <g class="hotspot" data-id="h11"><circle cx="950" cy="360" r="11" fill="#fbbf24" stroke="#0e1b2c" stroke-width="1.5"/><text x="950" y="364" font-size="11" fill="#0e1b2c" text-anchor="middle">11</text></g>
    <g class="hotspot" data-id="h12"><circle cx="730" cy="360" r="11" fill="#7dd3fc" stroke="#0e1b2c" stroke-width="1.5"/><text x="730" y="364" font-size="11" fill="#0e1b2c" text-anchor="middle">12</text></g>
    <g class="hotspot" data-id="h13"><circle cx="170" cy="480" r="12" fill="#22c55e" stroke="#0e1b2c" stroke-width="1.5"/><text x="170" y="484" font-size="11" fill="#0e1b2c" text-anchor="middle">13</text></g>
    <g class="hotspot" data-id="h14"><circle cx="730" cy="480" r="12" fill="#dc2626" stroke="#0e1b2c" stroke-width="1.5"/><text x="730" y="484" font-size="11" fill="#fff" text-anchor="middle">14</text></g>
  </g>
</svg>
