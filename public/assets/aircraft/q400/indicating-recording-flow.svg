<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 600" role="img" aria-label="Q400 indicating and recording architecture: five identical Display Units, EFCP and ESCP control panels, two clocks, FDR and CVR recorders, master warning and caution switchlights, GPWS and stall warning layer">
  <title>Q400 Indicating and Recording Architecture</title>
  <desc>Schematic of the Q400 Electronic Instrument System. Five identical interchangeable LCD Display Units (PFD1, MFD1, ED, MFD2, PFD2). EFIS uses 4 DUs (PFDs and MFDs). ESID uses 3 DUs (MFDs and ED). EFCP1 controls PFD1 and MFD1; EFCP2 controls PFD2 and MFD2; ESCP controls MFD1 and MFD2 and the ED. Two digital clocks feed the Flight Data Recorder and Cockpit Voice Recorder. Master Warning and Master Caution switchlights on glareshield. Stall warning and GPWS layered on top.</desc>

  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#0e1b2c"/><stop offset="1" stop-color="#0a1322"/></linearGradient>
    <linearGradient id="boxFill" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#1c2a40"/><stop offset="1" stop-color="#0e1b2c"/></linearGradient>
    <linearGradient id="duFill" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#0d3a26"/><stop offset="1" stop-color="#0a2418"/></linearGradient>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M 0 0 L 10 5 L 0 10 Z" fill="#7dd3fc"/></marker>
    <marker id="arrowGrn" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M 0 0 L 10 5 L 0 10 Z" fill="#22c55e"/></marker>
  </defs>

  <rect width="1200" height="600" fill="url(#bg)"/>

  <text x="600" y="34" text-anchor="middle" fill="#dde6f1" font-family="Inter, system-ui, sans-serif" font-size="20" font-weight="700">Q400 Indicating and Recording Architecture</text>
  <text x="600" y="56" text-anchor="middle" fill="#7a8aa6" font-family="Inter, system-ui, sans-serif" font-size="12">5 identical interchangeable DUs · EFIS 4 / ESID 3 · 2 clocks · FDR + CVR · Master WARN/CAUT · GPWS / SPS</text>

  <!-- DU row -->
  <g font-family="Inter, system-ui, sans-serif">
    <rect x="20" y="80" width="180" height="60" rx="8" fill="url(#duFill)" stroke="#22c55e" stroke-width="1.8"/>
    <text x="110" y="103" text-anchor="middle" fill="#86efac" font-size="13" font-weight="700">PFD1</text>
    <text x="110" y="121" text-anchor="middle" fill="#22c55e" font-size="10">pilot Primary Flight Display</text>
    <text x="110" y="135" text-anchor="middle" fill="#22c55e" font-size="10">FMA · ASI · EADI · ALT · EHSI</text>

    <rect x="220" y="80" width="180" height="60" rx="8" fill="url(#duFill)" stroke="#22c55e" stroke-width="1.8"/>
    <text x="310" y="103" text-anchor="middle" fill="#86efac" font-size="13" font-weight="700">MFD1</text>
    <text x="310" y="121" text-anchor="middle" fill="#22c55e" font-size="10">pilot MFD · NAV/SYS</text>
    <text x="310" y="135" text-anchor="middle" fill="#22c55e" font-size="10">PFCS Permanent Data Area</text>

    <rect x="420" y="80" width="160" height="60" rx="8" fill="url(#boxFill)" stroke="#fbbf24" stroke-width="1.8"/>
    <text x="500" y="103" text-anchor="middle" fill="#fcd34d" font-size="13" font-weight="700">ED</text>
    <text x="500" y="121" text-anchor="middle" fill="#fbbf24" font-size="10">Engine Display</text>
    <text x="500" y="135" text-anchor="middle" fill="#fbbf24" font-size="10">composite reversion</text>

    <rect x="600" y="80" width="180" height="60" rx="8" fill="url(#duFill)" stroke="#22c55e" stroke-width="1.8"/>
    <text x="690" y="103" text-anchor="middle" fill="#86efac" font-size="13" font-weight="700">MFD2</text>
    <text x="690" y="121" text-anchor="middle" fill="#22c55e" font-size="10">copilot MFD · SYS/NAV</text>
    <text x="690" y="135" text-anchor="middle" fill="#22c55e" font-size="10">Flap/Hyd Permanent Data Area</text>

    <rect x="800" y="80" width="180" height="60" rx="8" fill="url(#duFill)" stroke="#22c55e" stroke-width="1.8"/>
    <text x="890" y="103" text-anchor="middle" fill="#86efac" font-size="13" font-weight="700">PFD2</text>
    <text x="890" y="121" text-anchor="middle" fill="#22c55e" font-size="10">copilot Primary Flight Display</text>
    <text x="890" y="135" text-anchor="middle" fill="#22c55e" font-size="10">mirror of PFD1</text>

    <rect x="1000" y="80" width="180" height="60" rx="8" fill="url(#boxFill)" stroke="#7dd3fc" stroke-width="1.5" stroke-dasharray="4 2"/>
    <text x="1090" y="103" text-anchor="middle" fill="#7dd3fc" font-size="13" font-weight="700">IESI + STBY</text>
    <text x="1090" y="121" text-anchor="middle" fill="#a3b3c6" font-size="10">Integrated Electronic</text>
    <text x="1090" y="135" text-anchor="middle" fill="#a3b3c6" font-size="10">Standby Instrument</text>
  </g>

  <!-- Control panels row -->
  <g font-family="Inter, system-ui, sans-serif">
    <rect x="40" y="200" width="200" height="60" rx="8" fill="url(#boxFill)" stroke="#7dd3fc" stroke-width="1.8"/>
    <text x="140" y="223" text-anchor="middle" fill="#7dd3fc" font-size="13" font-weight="700">EFCP1 (pilot)</text>
    <text x="140" y="241" text-anchor="middle" fill="#a3b3c6" font-size="10">controls PFD1 + MFD1</text>
    <text x="140" y="255" text-anchor="middle" fill="#a3b3c6" font-size="10">brightness · BRG · RANGE</text>

    <rect x="400" y="180" width="400" height="80" rx="10" fill="#142339" stroke="#22c55e" stroke-width="2.2"/>
    <text x="600" y="205" text-anchor="middle" fill="#86efac" font-size="15" font-weight="700">ESCP (shared)</text>
    <text x="600" y="225" text-anchor="middle" fill="#22c55e" font-size="11">controls MFD1 + MFD2 + ED</text>
    <text x="600" y="243" text-anchor="middle" fill="#a3b3c6" font-size="10">PFD/NAV/SYS/ENG · ELEC/ENG/FUEL/DOORS/ALL</text>
    <text x="600" y="255" text-anchor="middle" fill="#fcd34d" font-size="10">MFD1 selector survives ESCP power loss · MFD2 dies</text>

    <rect x="960" y="200" width="200" height="60" rx="8" fill="url(#boxFill)" stroke="#7dd3fc" stroke-width="1.8"/>
    <text x="1060" y="223" text-anchor="middle" fill="#7dd3fc" font-size="13" font-weight="700">EFCP2 (copilot)</text>
    <text x="1060" y="241" text-anchor="middle" fill="#a3b3c6" font-size="10">controls PFD2 + MFD2</text>
    <text x="1060" y="255" text-anchor="middle" fill="#a3b3c6" font-size="10">brightness · BRG · RANGE</text>
  </g>

  <!-- Connection arrows -->
  <g stroke="#22c55e" stroke-width="1.5" fill="none" marker-end="url(#arrowGrn)" stroke-dasharray="3 2">
    <path d="M 140 200 L 110 140"/>
    <path d="M 140 200 L 310 140"/>
    <path d="M 600 180 L 310 140"/>
    <path d="M 600 180 L 500 140"/>
    <path d="M 600 180 L 690 140"/>
    <path d="M 1060 200 L 1090 140"/>
    <path d="M 1060 200 L 690 140"/>
    <path d="M 1060 200 L 890 140"/>
  </g>

  <!-- Recorders row -->
  <g font-family="Inter, system-ui, sans-serif">
    <rect x="40" y="290" width="200" height="60" rx="8" fill="url(#boxFill)" stroke="#a78bfa" stroke-width="1.8"/>
    <text x="140" y="313" text-anchor="middle" fill="#a78bfa" font-size="13" font-weight="700">CLOCKS · 2</text>
    <text x="140" y="331" text-anchor="middle" fill="#c4b5fd" font-size="10">No.1 → CVR direct + FDR</text>
    <text x="140" y="345" text-anchor="middle" fill="#c4b5fd" font-size="10">No.2 → FDR via FDPS only</text>

    <rect x="270" y="290" width="200" height="60" rx="8" fill="url(#boxFill)" stroke="#22c55e" stroke-width="1.8"/>
    <text x="370" y="313" text-anchor="middle" fill="#86efac" font-size="13" font-weight="700">FDPS / IFC</text>
    <text x="370" y="331" text-anchor="middle" fill="#22c55e" font-size="10">5 modules · 2 IFCs</text>
    <text x="370" y="345" text-anchor="middle" fill="#22c55e" font-size="10">acquires data · WTG</text>

    <rect x="500" y="290" width="200" height="60" rx="8" fill="url(#boxFill)" stroke="#dc2626" stroke-width="1.8"/>
    <text x="600" y="313" text-anchor="middle" fill="#fca5a5" font-size="13" font-weight="700">FDR</text>
    <text x="600" y="331" text-anchor="middle" fill="#fbbf24" font-size="10">Flight Data Recorder</text>
    <text x="600" y="345" text-anchor="middle" fill="#fbbf24" font-size="10">auto-switches to clock #2 on #1 fail</text>

    <rect x="730" y="290" width="200" height="60" rx="8" fill="url(#boxFill)" stroke="#dc2626" stroke-width="1.8"/>
    <text x="830" y="313" text-anchor="middle" fill="#fca5a5" font-size="13" font-weight="700">CVR</text>
    <text x="830" y="331" text-anchor="middle" fill="#fbbf24" font-size="10">Cockpit Voice Recorder</text>
    <text x="830" y="345" text-anchor="middle" fill="#fbbf24" font-size="10">real-time stamp from clock #1 only</text>

    <rect x="960" y="290" width="200" height="60" rx="8" fill="url(#boxFill)" stroke="#dc2626" stroke-width="1.8"/>
    <text x="1060" y="313" text-anchor="middle" fill="#fca5a5" font-size="13" font-weight="700">MASTER WARN/CAUT</text>
    <text x="1060" y="331" text-anchor="middle" fill="#fbbf24" font-size="10">RED warn · AMBER caution</text>
    <text x="1060" y="345" text-anchor="middle" fill="#fbbf24" font-size="10">push resets FLASH only</text>
  </g>

  <!-- SPS / GPWS / T-O horn layer -->
  <g font-family="Inter, system-ui, sans-serif">
    <rect x="200" y="400" width="800" height="80" rx="10" fill="#142339" stroke="#fbbf24" stroke-width="2"/>
    <text x="600" y="425" text-anchor="middle" fill="#fcd34d" font-size="15" font-weight="700">CENTRAL WARNING + SPS + GPWS LAYER</text>
    <text x="600" y="445" text-anchor="middle" fill="#fbbf24" font-size="11">STALL WARN test 1 (L shaker / ch 1) + test 2 (R shaker / ch 2) — each &gt;10 sec</text>
    <text x="600" y="463" text-anchor="middle" fill="#a3b3c6" font-size="10">T/O HORN — 5 conditions: spoilers · trim · brake · cond lever · flaps &gt;20° or &lt;3.5°</text>
    <text x="600" y="477" text-anchor="middle" fill="#a3b3c6" font-size="10">GPWS: PULL UP TEST · BELOW G/S · TERRAIN INHIBIT (white) · FLAP OVERRIDE (4B inhibit)</text>
  </g>

  <!-- Bottom callouts -->
  <g font-family="Inter, system-ui, sans-serif">
    <rect x="40" y="500" width="540" height="80" rx="8" fill="#0a1322" stroke="#3a4a66" stroke-width="1"/>
    <text x="60" y="520" fill="#dde6f1" font-size="11" font-weight="700">COLOR LOGIC + DISPLAY ATTRIBUTES</text>
    <text x="60" y="538" fill="#a3b3c6" font-size="11">RED warn · YELLOW caution · WHITE state · GREEN active · CYAN pilot · MAGENTA FMS/TCAS</text>
    <text x="60" y="556" fill="#a3b3c6" font-size="11">FLASH 1 Hz / 50% duty / 5 sec · REVERSE VIDEO = not pilot-initiated · [BRACKETS] = action</text>
    <text x="60" y="573" fill="#fcd34d" font-size="11">Mnemonics: RED-YELLOW-WHITE-GREEN-CYAN-MAGENTA · FLASH-1HZ-5SEC · BRACKETS-MEAN-ACTION</text>

    <rect x="600" y="500" width="560" height="80" rx="8" fill="#0a1322" stroke="#3a4a66" stroke-width="1"/>
    <text x="620" y="520" fill="#dde6f1" font-size="11" font-weight="700">REVERSION QUIRKS</text>
    <text x="620" y="538" fill="#a3b3c6" font-size="11">5 DUs identical · EFIS = 4 (PFDs+MFDs) · ESID = 3 (MFDs+ED)</text>
    <text x="620" y="556" fill="#a3b3c6" font-size="11">After ESCP power loss: MFD1 keeps working · MFD2 selector dies</text>
    <text x="620" y="573" fill="#fcd34d" font-size="11">Mnemonics: 5-DU-IDENTICAL · MFD2-DIES-WITH-ESCP · ALL-CYCLE-EFDD-E</text>
  </g>

  <!-- HOTSPOTS -->
  <g font-family="Inter, system-ui, sans-serif" font-weight="700">
    <g class="hotspot" data-id="h1"><circle cx="100" cy="100" r="11" fill="#22c55e" stroke="#0e1b2c" stroke-width="1.5"/><text x="100" y="104" font-size="11" fill="#0e1b2c" text-anchor="middle">1</text></g>
    <g class="hotspot" data-id="h2"><circle cx="300" cy="100" r="11" fill="#22c55e" stroke="#0e1b2c" stroke-width="1.5"/><text x="300" y="104" font-size="11" fill="#0e1b2c" text-anchor="middle">2</text></g>
    <g class="hotspot" data-id="h3"><circle cx="500" cy="100" r="11" fill="#fbbf24" stroke="#0e1b2c" stroke-width="1.5"/><text x="500" y="104" font-size="11" fill="#0e1b2c" text-anchor="middle">3</text></g>
    <g class="hotspot" data-id="h4"><circle cx="730" cy="100" r="11" fill="#22c55e" stroke="#0e1b2c" stroke-width="1.5"/><text x="730" y="104" font-size="11" fill="#0e1b2c" text-anchor="middle">4</text></g>
    <g class="hotspot" data-id="h5"><circle cx="950" cy="100" r="11" fill="#22c55e" stroke="#0e1b2c" stroke-width="1.5"/><text x="950" y="104" font-size="11" fill="#0e1b2c" text-anchor="middle">5</text></g>
    <g class="hotspot" data-id="h6"><circle cx="170" cy="240" r="11" fill="#7dd3fc" stroke="#0e1b2c" stroke-width="1.5"/><text x="170" y="244" font-size="11" fill="#0e1b2c" text-anchor="middle">6</text></g>
    <g class="hotspot" data-id="h7"><circle cx="600" cy="220" r="12" fill="#22c55e" stroke="#0e1b2c" stroke-width="1.5"/><text x="600" y="224" font-size="11" fill="#0e1b2c" text-anchor="middle">7</text></g>
    <g class="hotspot" data-id="h8"><circle cx="960" cy="240" r="11" fill="#7dd3fc" stroke="#0e1b2c" stroke-width="1.5"/><text x="960" y="244" font-size="11" fill="#0e1b2c" text-anchor="middle">8</text></g>
    <g class="hotspot" data-id="h9"><circle cx="170" cy="360" r="11" fill="#a78bfa" stroke="#0e1b2c" stroke-width="1.5"/><text x="170" y="364" font-size="11" fill="#fff" text-anchor="middle">9</text></g>
    <g class="hotspot" data-id="h10"><circle cx="430" cy="360" r="11" fill="#22c55e" stroke="#0e1b2c" stroke-width="1.5"/><text x="430" y="364" font-size="11" fill="#0e1b2c" text-anchor="middle">10</text></g>
    <g class="hotspot" data-id="h11"><circle cx="600" cy="360" r="11" fill="#dc2626" stroke="#0e1b2c" stroke-width="1.5"/><text x="600" y="364" font-size="11" fill="#fff" text-anchor="middle">11</text></g>
    <g class="hotspot" data-id="h12"><circle cx="770" cy="360" r="11" fill="#dc2626" stroke="#0e1b2c" stroke-width="1.5"/><text x="770" y="364" font-size="11" fill="#fff" text-anchor="middle">12</text></g>
    <g class="hotspot" data-id="h13"><circle cx="960" cy="360" r="11" fill="#dc2626" stroke="#0e1b2c" stroke-width="1.5"/><text x="960" y="364" font-size="11" fill="#fff" text-anchor="middle">13</text></g>
    <g class="hotspot" data-id="h14"><circle cx="600" cy="480" r="12" fill="#fbbf24" stroke="#0e1b2c" stroke-width="1.5"/><text x="600" y="484" font-size="11" fill="#0e1b2c" text-anchor="middle">14</text></g>
  </g>
</svg>
