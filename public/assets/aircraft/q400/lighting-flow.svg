<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 600" role="img" aria-label="Q400 lighting architecture: interior cockpit and cabin lighting, exterior landing taxi position anti-collision recognition logo, emergency lights with battery packs">
  <title>Q400 Lighting Architecture</title>
  <desc>Schematic of the Q400 lighting system. Interior cockpit panel and instrument lighting at 5 VDC variable, dome on BATTERY PWR, storm on L SECONDARY, utility and map lights, circuit breaker panel lights. Cabin overhead and sidewall fluorescent fixtures, reading lights, signs, lavatory, baggage. Exterior landing approach and flare, taxi light on steerable nose gear with gear-down inhibit, position lights with primary plus secondary failover, anti-collision and recognition. Emergency lighting on a 3-position lever-locked switch with battery packs.</desc>

  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#0e1b2c"/><stop offset="1" stop-color="#0a1322"/></linearGradient>
    <linearGradient id="boxFill" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#1c2a40"/><stop offset="1" stop-color="#0e1b2c"/></linearGradient>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M 0 0 L 10 5 L 0 10 Z" fill="#7dd3fc"/></marker>
  </defs>

  <rect width="1200" height="600" fill="url(#bg)"/>

  <text x="600" y="34" text-anchor="middle" fill="#dde6f1" font-family="Inter, system-ui, sans-serif" font-size="20" font-weight="700">Q400 Lighting Architecture</text>
  <text x="600" y="56" text-anchor="middle" fill="#7a8aa6" font-family="Inter, system-ui, sans-serif" font-size="12">Interior · Exterior · Emergency · 5 VDC variable · BATTERY PWR dome · 21+21 cabin · primary+secondary failover</text>

  <!-- Interior cockpit row -->
  <g font-family="Inter, system-ui, sans-serif">
    <rect x="40" y="80" width="200" height="60" rx="8" fill="url(#boxFill)" stroke="#fbbf24" stroke-width="1.8"/>
    <text x="140" y="103" text-anchor="middle" fill="#fcd34d" font-size="13" font-weight="700">PANEL LIGHTING</text>
    <text x="140" y="121" text-anchor="middle" fill="#fbbf24" font-size="10">5 VDC variable · disc lamps</text>
    <text x="140" y="135" text-anchor="middle" fill="#fbbf24" font-size="10">4 knobs + per-pilot FLT PNL</text>

    <rect x="270" y="80" width="200" height="60" rx="8" fill="url(#boxFill)" stroke="#fbbf24" stroke-width="1.8"/>
    <text x="370" y="103" text-anchor="middle" fill="#fcd34d" font-size="13" font-weight="700">DOME</text>
    <text x="370" y="121" text-anchor="middle" fill="#fbbf24" font-size="10">BATTERY PWR bus</text>
    <text x="370" y="135" text-anchor="middle" fill="#fbbf24" font-size="10">no BATTERY MASTER req</text>

    <rect x="500" y="80" width="200" height="60" rx="8" fill="url(#boxFill)" stroke="#a78bfa" stroke-width="1.8"/>
    <text x="600" y="103" text-anchor="middle" fill="#a78bfa" font-size="13" font-weight="700">STORM/DOME</text>
    <text x="600" y="121" text-anchor="middle" fill="#c4b5fd" font-size="10">L SECONDARY bus</text>
    <text x="600" y="135" text-anchor="middle" fill="#c4b5fd" font-size="10">flash recovery</text>

    <rect x="730" y="80" width="200" height="60" rx="8" fill="url(#boxFill)" stroke="#22d3ee" stroke-width="1.8"/>
    <text x="830" y="103" text-anchor="middle" fill="#22d3ee" font-size="13" font-weight="700">UTILITY + MAP</text>
    <text x="830" y="121" text-anchor="middle" fill="#7dd3fc" font-size="10">2 utility + 1 observer</text>
    <text x="830" y="135" text-anchor="middle" fill="#7dd3fc" font-size="10">map + W/S WIPER ICE</text>

    <rect x="960" y="80" width="200" height="60" rx="8" fill="url(#boxFill)" stroke="#7dd3fc" stroke-width="1.8"/>
    <text x="1060" y="103" text-anchor="middle" fill="#7dd3fc" font-size="13" font-weight="700">CIR BKR LIGHT</text>
    <text x="1060" y="121" text-anchor="middle" fill="#a3b3c6" font-size="10">white floodlights · per pilot</text>
    <text x="1060" y="135" text-anchor="middle" fill="#a3b3c6" font-size="10">avionics + AC freq panels</text>
  </g>

  <!-- Cabin row -->
  <g font-family="Inter, system-ui, sans-serif">
    <rect x="40" y="200" width="200" height="60" rx="8" fill="url(#boxFill)" stroke="#22c55e" stroke-width="1.8"/>
    <text x="140" y="223" text-anchor="middle" fill="#86efac" font-size="13" font-weight="700">CABIN 21+21</text>
    <text x="140" y="241" text-anchor="middle" fill="#22c55e" font-size="10">21 overhead + 21 sidewall</text>
    <text x="140" y="255" text-anchor="middle" fill="#22c55e" font-size="10">single dimmer · F/A panel</text>

    <rect x="270" y="200" width="200" height="60" rx="8" fill="url(#boxFill)" stroke="#fbbf24" stroke-width="1.8"/>
    <text x="370" y="223" text-anchor="middle" fill="#fcd34d" font-size="13" font-weight="700">SIGNS + AUTO</text>
    <text x="370" y="241" text-anchor="middle" fill="#fbbf24" font-size="10">NO SMOKING auto on gear DN</text>
    <text x="370" y="255" text-anchor="middle" fill="#fbbf24" font-size="10">FASTEN BELTS + chime</text>

    <rect x="500" y="200" width="200" height="60" rx="8" fill="url(#boxFill)" stroke="#a78bfa" stroke-width="1.8"/>
    <text x="600" y="223" text-anchor="middle" fill="#a78bfa" font-size="13" font-weight="700">LAVATORY</text>
    <text x="600" y="241" text-anchor="middle" fill="#c4b5fd" font-size="10">2 lamps + 2 fluorescent</text>
    <text x="600" y="255" text-anchor="middle" fill="#c4b5fd" font-size="10">OCCUPIED latch + F/A indicator</text>

    <rect x="730" y="200" width="200" height="60" rx="8" fill="url(#boxFill)" stroke="#22d3ee" stroke-width="1.8"/>
    <text x="830" y="223" text-anchor="middle" fill="#22d3ee" font-size="13" font-weight="700">PSU + READING</text>
    <text x="830" y="241" text-anchor="middle" fill="#7dd3fc" font-size="10">2 reading lights/PSU</text>
    <text x="830" y="255" text-anchor="middle" fill="#7dd3fc" font-size="10">PSU ON/OFF gate</text>

    <rect x="960" y="200" width="200" height="60" rx="8" fill="url(#boxFill)" stroke="#7dd3fc" stroke-width="1.8"/>
    <text x="1060" y="223" text-anchor="middle" fill="#7dd3fc" font-size="13" font-weight="700">DOOR + BOARDING</text>
    <text x="1060" y="241" text-anchor="middle" fill="#a3b3c6" font-size="10">4 step (L Main) + 2 boarding</text>
    <text x="1060" y="255" text-anchor="middle" fill="#a3b3c6" font-size="10">(Battery bus)</text>
  </g>

  <!-- Exterior + Emergency row -->
  <g font-family="Inter, system-ui, sans-serif">
    <rect x="40" y="290" width="200" height="60" rx="8" fill="url(#boxFill)" stroke="#fbbf24" stroke-width="1.8"/>
    <text x="140" y="313" text-anchor="middle" fill="#fcd34d" font-size="13" font-weight="700">LANDING (4)</text>
    <text x="140" y="331" text-anchor="middle" fill="#fbbf24" font-size="10">2/wing · OUT approach</text>
    <text x="140" y="345" text-anchor="middle" fill="#fbbf24" font-size="10">IN flare (angled down)</text>

    <rect x="270" y="290" width="200" height="60" rx="8" fill="url(#boxFill)" stroke="#fbbf24" stroke-width="1.8"/>
    <text x="370" y="313" text-anchor="middle" fill="#fcd34d" font-size="13" font-weight="700">TAXI</text>
    <text x="370" y="331" text-anchor="middle" fill="#fbbf24" font-size="10">on steerable nose gear</text>
    <text x="370" y="345" text-anchor="middle" fill="#fbbf24" font-size="10">inhibited unless gear LOCKED</text>

    <rect x="500" y="290" width="220" height="60" rx="8" fill="url(#boxFill)" stroke="#22c55e" stroke-width="1.8"/>
    <text x="610" y="313" text-anchor="middle" fill="#86efac" font-size="13" font-weight="700">POSITION + ANTI-COLL</text>
    <text x="610" y="331" text-anchor="middle" fill="#22c55e" font-size="10">GREEN R · RED L · WHITE AFT</text>
    <text x="610" y="345" text-anchor="middle" fill="#22c55e" font-size="10">primary+secondary · ~1-sec ARM</text>

    <rect x="750" y="290" width="200" height="60" rx="8" fill="url(#boxFill)" stroke="#fbbf24" stroke-width="1.8"/>
    <text x="850" y="313" text-anchor="middle" fill="#fcd34d" font-size="13" font-weight="700">RECOG + INSPECT</text>
    <text x="850" y="331" text-anchor="middle" fill="#fbbf24" font-size="10">red top fuselage</text>
    <text x="850" y="345" text-anchor="middle" fill="#fbbf24" font-size="10">wing/eng inspection · logo</text>

    <rect x="980" y="280" width="180" height="80" rx="10" fill="#142339" stroke="#dc2626" stroke-width="2.2"/>
    <text x="1070" y="305" text-anchor="middle" fill="#fca5a5" font-size="15" font-weight="700">EMER LIGHTS</text>
    <text x="1070" y="325" text-anchor="middle" fill="#dc2626" font-size="11">3-pos lever-lock</text>
    <text x="1070" y="343" text-anchor="middle" fill="#fbbf24" font-size="10">ON / ARM / OFF</text>
    <text x="1070" y="357" text-anchor="middle" fill="#fbbf24" font-size="10">ARM = auto on AC loss</text>
  </g>

  <!-- Bottom callouts -->
  <g font-family="Inter, system-ui, sans-serif">
    <rect x="40" y="400" width="540" height="80" rx="8" fill="#0a1322" stroke="#3a4a66" stroke-width="1"/>
    <text x="60" y="420" fill="#dde6f1" font-size="11" font-weight="700">AUTO-LOGIC ITEMS</text>
    <text x="60" y="438" fill="#a3b3c6" font-size="11">NO SMOKING signs auto-on when gear selector to DN (cockpit switch can be OFF)</text>
    <text x="60" y="456" fill="#a3b3c6" font-size="11">TAXI LIGHT inhibited unless gear is LOCKED DOWN (not just selected DN)</text>
    <text x="60" y="473" fill="#fcd34d" font-size="11">Mnemonics: NO-SMOKE-GEAR-DN · TAXI-LOCK-DOWN</text>

    <rect x="600" y="400" width="560" height="80" rx="8" fill="#0a1322" stroke="#3a4a66" stroke-width="1"/>
    <text x="620" y="420" fill="#dde6f1" font-size="11" font-weight="700">POSITION LIGHT FAILOVER</text>
    <text x="620" y="438" fill="#a3b3c6" font-size="11">POSN switch ON: both primary + secondary on. After ~1 sec, secondaries go off but ARMED</text>
    <text x="620" y="456" fill="#a3b3c6" font-size="11">If a primary fails: related armed secondary auto-illuminates · silent in cockpit (no caution)</text>
    <text x="620" y="473" fill="#fcd34d" font-size="11">Mnemonics: PRI-SEC-1-SEC-ARM · GREEN-RIGHT-RED-LEFT-WHITE-AFT</text>
  </g>

  <!-- Emergency callout -->
  <g font-family="Inter, system-ui, sans-serif">
    <rect x="40" y="500" width="1120" height="80" rx="8" fill="#0a1322" stroke="#dc2626" stroke-width="1.5"/>
    <text x="60" y="520" fill="#fca5a5" font-size="11" font-weight="700">EMERGENCY LIGHTING — ARM IS NORMAL FLIGHT SETTING</text>
    <text x="60" y="540" fill="#a3b3c6" font-size="11">3-position lever-locked switch. ARM = auto-illuminate egress chain (ceiling, floor markings, locator, exit, egress) on AC power loss</text>
    <text x="60" y="558" fill="#a3b3c6" font-size="11">Battery packs power emergency lighting. Cockpit dome (BATTERY PWR) remains; storm (L SECONDARY) gone with AC</text>
    <text x="60" y="575" fill="#fcd34d" font-size="11">Mnemonic: EMER-3-POS-ARM · DOME-BATTERY-NO-MASTER · STORM-FLASH-RECOVER</text>
  </g>

  <!-- HOTSPOTS -->
  <g font-family="Inter, system-ui, sans-serif" font-weight="700">
    <g class="hotspot" data-id="h1"><circle cx="170" cy="100" r="11" fill="#fbbf24" stroke="#0e1b2c" stroke-width="1.5"/><text x="170" y="104" font-size="11" fill="#0e1b2c" text-anchor="middle">1</text></g>
    <g class="hotspot" data-id="h2"><circle cx="430" cy="100" r="11" fill="#fbbf24" stroke="#0e1b2c" stroke-width="1.5"/><text x="430" y="104" font-size="11" fill="#0e1b2c" text-anchor="middle">2</text></g>
    <g class="hotspot" data-id="h3"><circle cx="600" cy="100" r="11" fill="#a78bfa" stroke="#0e1b2c" stroke-width="1.5"/><text x="600" y="104" font-size="11" fill="#fff" text-anchor="middle">3</text></g>
    <g class="hotspot" data-id="h4"><circle cx="770" cy="100" r="11" fill="#22d3ee" stroke="#0e1b2c" stroke-width="1.5"/><text x="770" y="104" font-size="11" fill="#0e1b2c" text-anchor="middle">4</text></g>
    <g class="hotspot" data-id="h5"><circle cx="960" cy="100" r="11" fill="#7dd3fc" stroke="#0e1b2c" stroke-width="1.5"/><text x="960" y="104" font-size="11" fill="#0e1b2c" text-anchor="middle">5</text></g>
    <g class="hotspot" data-id="h6"><circle cx="170" cy="240" r="11" fill="#22c55e" stroke="#0e1b2c" stroke-width="1.5"/><text x="170" y="244" font-size="11" fill="#0e1b2c" text-anchor="middle">6</text></g>
    <g class="hotspot" data-id="h7"><circle cx="430" cy="240" r="11" fill="#fbbf24" stroke="#0e1b2c" stroke-width="1.5"/><text x="430" y="244" font-size="11" fill="#0e1b2c" text-anchor="middle">7</text></g>
    <g class="hotspot" data-id="h8"><circle cx="600" cy="240" r="11" fill="#a78bfa" stroke="#0e1b2c" stroke-width="1.5"/><text x="600" y="244" font-size="11" fill="#fff" text-anchor="middle">8</text></g>
    <g class="hotspot" data-id="h9"><circle cx="770" cy="240" r="11" fill="#22d3ee" stroke="#0e1b2c" stroke-width="1.5"/><text x="770" y="244" font-size="11" fill="#0e1b2c" text-anchor="middle">9</text></g>
    <g class="hotspot" data-id="h10"><circle cx="960" cy="240" r="11" fill="#7dd3fc" stroke="#0e1b2c" stroke-width="1.5"/><text x="960" y="244" font-size="11" fill="#0e1b2c" text-anchor="middle">10</text></g>
    <g class="hotspot" data-id="h11"><circle cx="170" cy="360" r="11" fill="#fbbf24" stroke="#0e1b2c" stroke-width="1.5"/><text x="170" y="364" font-size="11" fill="#0e1b2c" text-anchor="middle">11</text></g>
    <g class="hotspot" data-id="h12"><circle cx="430" cy="360" r="11" fill="#fbbf24" stroke="#0e1b2c" stroke-width="1.5"/><text x="430" y="364" font-size="11" fill="#0e1b2c" text-anchor="middle">12</text></g>
    <g class="hotspot" data-id="h13"><circle cx="600" cy="360" r="11" fill="#22c55e" stroke="#0e1b2c" stroke-width="1.5"/><text x="600" y="364" font-size="11" fill="#0e1b2c" text-anchor="middle">13</text></g>
    <g class="hotspot" data-id="h14"><circle cx="1070" cy="320" r="12" fill="#dc2626" stroke="#0e1b2c" stroke-width="1.5"/><text x="1070" y="324" font-size="11" fill="#fff" text-anchor="middle">14</text></g>
  </g>
</svg>
