<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 600" role="img" aria-label="Q400 APU and bleed air architecture: titanium tailcone, gas turbine, starter generator, bleed valve, fuel from left wing, fire detection 7 second auto extinguishing">
  <title>Q400 APU and Bleed Air Architecture</title>
  <desc>Schematic of the Q400 APU and pneumatic system. APU is a gas turbine engine in titanium tailcone with firewall. Two clamshell access doors on the bottom. Air intake right rear. Exhaust upwards from aft tailcone. Cannot operate in flight; shutoff valve closes airborne. Fuel from left wing collector bay. Starter to half operating speed. APU bleed valve supplies ECS and holds aft safety valve open; auto de-energizes when engine BLEED selected. 7 second auto extinguishing on fire detection. No restart after bottle discharge.</desc>

  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#0e1b2c"/><stop offset="1" stop-color="#0a1322"/></linearGradient>
    <linearGradient id="boxFill" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#1c2a40"/><stop offset="1" stop-color="#0e1b2c"/></linearGradient>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M 0 0 L 10 5 L 0 10 Z" fill="#7dd3fc"/></marker>
  </defs>

  <rect width="1200" height="600" fill="url(#bg)"/>

  <text x="600" y="34" text-anchor="middle" fill="#dde6f1" font-family="Inter, system-ui, sans-serif" font-size="20" font-weight="700">Q400 APU and Bleed Air Architecture</text>
  <text x="600" y="56" text-anchor="middle" fill="#7a8aa6" font-family="Inter, system-ui, sans-serif" font-size="12">APU GROUND-ONLY · titanium tailcone · 2 clamshell doors · half-speed starter · 7-sec auto-extg · no restart after discharge</text>

  <!-- APU + access row -->
  <g font-family="Inter, system-ui, sans-serif">
    <rect x="40" y="80" width="200" height="60" rx="8" fill="url(#boxFill)" stroke="#a78bfa" stroke-width="1.8"/>
    <text x="140" y="103" text-anchor="middle" fill="#a78bfa" font-size="13" font-weight="700">APU GAS TURBINE</text>
    <text x="140" y="121" text-anchor="middle" fill="#c4b5fd" font-size="10">titanium tailcone + firewall</text>
    <text x="140" y="135" text-anchor="middle" fill="#c4b5fd" font-size="10">CANNOT operate in flight</text>

    <rect x="270" y="80" width="200" height="60" rx="8" fill="url(#boxFill)" stroke="#7dd3fc" stroke-width="1.8"/>
    <text x="370" y="103" text-anchor="middle" fill="#7dd3fc" font-size="13" font-weight="700">CLAMSHELL DOORS</text>
    <text x="370" y="121" text-anchor="middle" fill="#a3b3c6" font-size="10">2 doors on bottom of tailcone</text>
    <text x="370" y="135" text-anchor="middle" fill="#a3b3c6" font-size="10">ground access</text>

    <rect x="500" y="80" width="200" height="60" rx="8" fill="url(#boxFill)" stroke="#22d3ee" stroke-width="1.8"/>
    <text x="600" y="103" text-anchor="middle" fill="#22d3ee" font-size="13" font-weight="700">AIR INTAKE</text>
    <text x="600" y="121" text-anchor="middle" fill="#7dd3fc" font-size="10">right rear of fuselage</text>
    <text x="600" y="135" text-anchor="middle" fill="#7dd3fc" font-size="10">screened · optional louvre</text>

    <rect x="730" y="80" width="200" height="60" rx="8" fill="url(#boxFill)" stroke="#fbbf24" stroke-width="1.8"/>
    <text x="830" y="103" text-anchor="middle" fill="#fcd34d" font-size="13" font-weight="700">EXHAUST</text>
    <text x="830" y="121" text-anchor="middle" fill="#fbbf24" font-size="10">ejector + aft tailcone</text>
    <text x="830" y="135" text-anchor="middle" fill="#fbbf24" font-size="10">upwards-pointing</text>

    <rect x="960" y="80" width="200" height="60" rx="8" fill="url(#boxFill)" stroke="#22c55e" stroke-width="1.8"/>
    <text x="1060" y="103" text-anchor="middle" fill="#86efac" font-size="13" font-weight="700">APU FADEC</text>
    <text x="1060" y="121" text-anchor="middle" fill="#22c55e" font-size="10">start · normal · monitor</text>
    <text x="1060" y="135" text-anchor="middle" fill="#22c55e" font-size="10">auto-managed</text>
  </g>

  <!-- Starter + Fuel + Bleed + Check + Panel -->
  <g font-family="Inter, system-ui, sans-serif">
    <rect x="40" y="200" width="200" height="60" rx="8" fill="url(#boxFill)" stroke="#22c55e" stroke-width="1.8"/>
    <text x="140" y="223" text-anchor="middle" fill="#86efac" font-size="13" font-weight="700">STARTER-GEN 28V</text>
    <text x="140" y="241" text-anchor="middle" fill="#22c55e" font-size="10">starter to HALF speed</text>
    <text x="140" y="255" text-anchor="middle" fill="#22c55e" font-size="10">EXT pwr inhibits APU GEN</text>

    <rect x="270" y="200" width="200" height="60" rx="8" fill="url(#boxFill)" stroke="#dc2626" stroke-width="1.8"/>
    <text x="370" y="223" text-anchor="middle" fill="#fca5a5" font-size="13" font-weight="700">FUEL VALVE</text>
    <text x="370" y="241" text-anchor="middle" fill="#fbbf24" font-size="10">left wing collector bay</text>
    <text x="370" y="255" text-anchor="middle" fill="#fbbf24" font-size="10">closes 4 conditions</text>

    <rect x="500" y="200" width="200" height="60" rx="8" fill="url(#boxFill)" stroke="#22d3ee" stroke-width="1.8"/>
    <text x="600" y="223" text-anchor="middle" fill="#22d3ee" font-size="13" font-weight="700">BLEED VALVE</text>
    <text x="600" y="241" text-anchor="middle" fill="#7dd3fc" font-size="10">ECS + CPCS aft safety</text>
    <text x="600" y="255" text-anchor="middle" fill="#7dd3fc" font-size="10">auto-off with engine BLEED</text>

    <rect x="730" y="200" width="200" height="60" rx="8" fill="url(#boxFill)" stroke="#a78bfa" stroke-width="1.8"/>
    <text x="830" y="223" text-anchor="middle" fill="#a78bfa" font-size="13" font-weight="700">CHECK VALVES</text>
    <text x="830" y="241" text-anchor="middle" fill="#c4b5fd" font-size="10">APU + wing duct check</text>
    <text x="830" y="255" text-anchor="middle" fill="#c4b5fd" font-size="10">prevent cross to de-ice</text>

    <rect x="960" y="200" width="200" height="60" rx="8" fill="url(#boxFill)" stroke="#fbbf24" stroke-width="1.8"/>
    <text x="1060" y="223" text-anchor="middle" fill="#fcd34d" font-size="13" font-weight="700">CONTROL PANEL</text>
    <text x="1060" y="241" text-anchor="middle" fill="#fbbf24" font-size="10">PWR · START · GEN · BL AIR</text>
    <text x="1060" y="255" text-anchor="middle" fill="#fbbf24" font-size="10">overhead console</text>
  </g>

  <!-- Fire row -->
  <g font-family="Inter, system-ui, sans-serif">
    <rect x="40" y="290" width="220" height="60" rx="8" fill="url(#boxFill)" stroke="#dc2626" stroke-width="1.8"/>
    <text x="150" y="313" text-anchor="middle" fill="#fca5a5" font-size="13" font-weight="700">FIRE LOOP SENSOR</text>
    <text x="150" y="331" text-anchor="middle" fill="#fbbf24" font-size="10">along tailcone above APU</text>
    <text x="150" y="345" text-anchor="middle" fill="#fbbf24" font-size="10">RIGHT ESS 28 VDC bus</text>

    <rect x="290" y="290" width="220" height="60" rx="8" fill="url(#boxFill)" stroke="#dc2626" stroke-width="1.8"/>
    <text x="400" y="313" text-anchor="middle" fill="#fca5a5" font-size="13" font-weight="700">FIRE BOTTLE</text>
    <text x="400" y="331" text-anchor="middle" fill="#fbbf24" font-size="10">stainless steel · auto 7 sec</text>
    <text x="400" y="345" text-anchor="middle" fill="#fbbf24" font-size="10">no restart after discharge</text>

    <rect x="540" y="290" width="280" height="60" rx="8" fill="url(#boxFill)" stroke="#fbbf24" stroke-width="1.8"/>
    <text x="680" y="313" text-anchor="middle" fill="#fcd34d" font-size="13" font-weight="700">FPP — Fire Protection Panel</text>
    <text x="680" y="331" text-anchor="middle" fill="#fbbf24" font-size="10">FIRE red · BTL ARM · EXTG</text>
    <text x="680" y="345" text-anchor="middle" fill="#fbbf24" font-size="10">FUEL VALVE OPEN/CLOSED · BOTTLE LOW</text>

    <rect x="850" y="290" width="310" height="60" rx="8" fill="url(#boxFill)" stroke="#dc2626" stroke-width="1.8"/>
    <text x="1005" y="313" text-anchor="middle" fill="#fca5a5" font-size="13" font-weight="700">STARTER BATTERIES</text>
    <text x="1005" y="331" text-anchor="middle" fill="#fbbf24" font-size="10">2×40 Ahr NiCad (MAIN + AUX)</text>
    <text x="1005" y="345" text-anchor="middle" fill="#fbbf24" font-size="10">100% → ~20 V · 50% → ~18 V</text>
  </g>

  <!-- Bottom callouts -->
  <g font-family="Inter, system-ui, sans-serif">
    <rect x="40" y="400" width="540" height="80" rx="8" fill="#0a1322" stroke="#3a4a66" stroke-width="1"/>
    <text x="60" y="420" fill="#dde6f1" font-size="11" font-weight="700">PWR ARMING + FUEL VALVE LOGIC</text>
    <text x="60" y="438" fill="#a3b3c6" font-size="11">PWR arms only if: GROUND + NO FIRE + EXTG NOT SELECTED (3 conditions)</text>
    <text x="60" y="456" fill="#a3b3c6" font-size="11">Fuel valve closes if: PWR off / FIRE / EXTG / aircraft in flight (4 conditions)</text>
    <text x="60" y="473" fill="#fcd34d" font-size="11">Mnemonics: 3-COND-PWR-ARM · 4-COND-FUEL-CLOSE · APU-GROUND-ONLY</text>

    <rect x="600" y="400" width="560" height="80" rx="8" fill="#0a1322" stroke="#3a4a66" stroke-width="1"/>
    <text x="620" y="420" fill="#dde6f1" font-size="11" font-weight="700">FIRE + BLEED CRITICAL ITEMS</text>
    <text x="620" y="438" fill="#a3b3c6" font-size="11">Fire: 7-sec auto-extg · NO restart after bottle discharge until replaced</text>
    <text x="620" y="456" fill="#a3b3c6" font-size="11">Bleed: auto-de-energizes with engine BLEED · reduces if APU EGT high</text>
    <text x="620" y="473" fill="#fcd34d" font-size="11">Mnemonics: 7-SEC-AUTO-EXTG · BL-AIR-AUTO-OFF-WITH-ENG · NO-RESTART-AFTER-DISCHARGE</text>
  </g>

  <!-- Limitations callout -->
  <g font-family="Inter, system-ui, sans-serif">
    <rect x="40" y="500" width="1120" height="80" rx="8" fill="#0a1322" stroke="#22c55e" stroke-width="1.5"/>
    <text x="60" y="520" fill="#86efac" font-size="11" font-weight="700">LIMITATIONS + STARTUP NUMBERS</text>
    <text x="60" y="540" fill="#a3b3c6" font-size="11">Composite cooling duct removed: 30°C OR ISA+25°C, whichever LOWER</text>
    <text x="60" y="558" fill="#a3b3c6" font-size="11">Air Inlet Louvre installed: 21°C ambient max · Starter cuts at HALF operating speed</text>
    <text x="60" y="575" fill="#fcd34d" font-size="11">Mnemonics: LOUVRE-21-DUCT-30 · HALF-SPEED-STARTER · 100-20-50-18</text>
  </g>

  <!-- HOTSPOTS -->
  <g font-family="Inter, system-ui, sans-serif" font-weight="700">
    <g class="hotspot" data-id="h1"><circle cx="170" cy="100" r="11" fill="#a78bfa" stroke="#0e1b2c" stroke-width="1.5"/><text x="170" y="104" font-size="11" fill="#fff" text-anchor="middle">1</text></g>
    <g class="hotspot" data-id="h2"><circle cx="430" cy="100" r="11" fill="#7dd3fc" stroke="#0e1b2c" stroke-width="1.5"/><text x="430" y="104" font-size="11" fill="#0e1b2c" text-anchor="middle">2</text></g>
    <g class="hotspot" data-id="h3"><circle cx="600" cy="100" r="11" fill="#22d3ee" stroke="#0e1b2c" stroke-width="1.5"/><text x="600" y="104" font-size="11" fill="#0e1b2c" text-anchor="middle">3</text></g>
    <g class="hotspot" data-id="h4"><circle cx="770" cy="100" r="11" fill="#fbbf24" stroke="#0e1b2c" stroke-width="1.5"/><text x="770" y="104" font-size="11" fill="#0e1b2c" text-anchor="middle">4</text></g>
    <g class="hotspot" data-id="h5"><circle cx="960" cy="100" r="11" fill="#22c55e" stroke="#0e1b2c" stroke-width="1.5"/><text x="960" y="104" font-size="11" fill="#0e1b2c" text-anchor="middle">5</text></g>
    <g class="hotspot" data-id="h6"><circle cx="170" cy="240" r="11" fill="#22c55e" stroke="#0e1b2c" stroke-width="1.5"/><text x="170" y="244" font-size="11" fill="#0e1b2c" text-anchor="middle">6</text></g>
    <g class="hotspot" data-id="h7"><circle cx="430" cy="240" r="11" fill="#dc2626" stroke="#0e1b2c" stroke-width="1.5"/><text x="430" y="244" font-size="11" fill="#fff" text-anchor="middle">7</text></g>
    <g class="hotspot" data-id="h8"><circle cx="600" cy="240" r="11" fill="#22d3ee" stroke="#0e1b2c" stroke-width="1.5"/><text x="600" y="244" font-size="11" fill="#0e1b2c" text-anchor="middle">8</text></g>
    <g class="hotspot" data-id="h9"><circle cx="770" cy="240" r="11" fill="#a78bfa" stroke="#0e1b2c" stroke-width="1.5"/><text x="770" y="244" font-size="11" fill="#fff" text-anchor="middle">9</text></g>
    <g class="hotspot" data-id="h10"><circle cx="960" cy="240" r="11" fill="#fbbf24" stroke="#0e1b2c" stroke-width="1.5"/><text x="960" y="244" font-size="11" fill="#0e1b2c" text-anchor="middle">10</text></g>
    <g class="hotspot" data-id="h11"><circle cx="170" cy="360" r="11" fill="#dc2626" stroke="#0e1b2c" stroke-width="1.5"/><text x="170" y="364" font-size="11" fill="#fff" text-anchor="middle">11</text></g>
    <g class="hotspot" data-id="h12"><circle cx="430" cy="360" r="11" fill="#dc2626" stroke="#0e1b2c" stroke-width="1.5"/><text x="430" y="364" font-size="11" fill="#fff" text-anchor="middle">12</text></g>
    <g class="hotspot" data-id="h13"><circle cx="770" cy="360" r="11" fill="#fbbf24" stroke="#0e1b2c" stroke-width="1.5"/><text x="770" y="364" font-size="11" fill="#0e1b2c" text-anchor="middle">13</text></g>
    <g class="hotspot" data-id="h14"><circle cx="1005" cy="360" r="11" fill="#dc2626" stroke="#0e1b2c" stroke-width="1.5"/><text x="1005" y="364" font-size="11" fill="#fff" text-anchor="middle">14</text></g>
  </g>
</svg>
